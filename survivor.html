<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor · NFL Pick Em</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:#F7F5F0; --cream-dark:#EDEAE2;
      --ink:#1A1A1A; --ink-light:#555550; --ink-faint:#999990;
      --navy:#1B3A5C; --red:#C0392B; --green:#27AE60; --accent:#E8A838;
      --white:#FFFFFF;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08); --shadow-md:0 4px 16px rgba(0,0,0,.10);
      --radius:12px; --radius-sm:8px;
    }
    html,body { min-height:100%; font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); }
    body { padding-top:58px; }
    .page-wrap { max-width:900px; margin:0 auto; padding:24px 16px 60px; }
    .page-title { font-family:'DM Serif Display',serif; font-size:28px; color:var(--navy); }
    .page-subtitle { font-size:14px; color:var(--ink-faint); margin-top:4px; margin-bottom:24px; }
    .spinner { width:28px; height:28px; border:3px solid var(--cream-dark); border-top-color:var(--navy); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .state-box { text-align:center; padding:40px 20px; color:var(--ink-faint); }

    /* Status card */
    .status-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:20px 24px; margin-bottom:24px; border-left:4px solid var(--green); }
    .status-card.dead     { border-left-color:var(--red); }
    .status-card.freepass { border-left-color:var(--accent); }
    .status-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .status-left { display:flex; align-items:center; gap:14px; }
    .status-icon { font-size:36px; line-height:1; }
    .status-title { font-family:'DM Serif Display',serif; font-size:22px; color:var(--navy); }
    .status-subtitle { font-size:13px; color:var(--ink-faint); margin-top:3px; }
    .fp-note { font-size:13px; }
    .pick-result-row { margin-top:16px; padding-top:16px; border-top:1px solid var(--cream-dark); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .pick-logo { width:28px; height:28px; object-fit:contain; }
    .pick-team-name { font-weight:600; font-size:15px; }
    .result-badge { font-size:13px; font-weight:700; padding:3px 10px; border-radius:100px; }
    .result-badge.win     { background:#D4EDDA; color:#155724; }
    .result-badge.loss    { background:#F8D7DA; color:#721C24; }
    .result-badge.pending { background:var(--cream-dark); color:var(--ink-faint); }
    .btn-fp { margin-top:12px; padding:10px 18px; background:var(--accent); color:var(--ink); border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; display:block; }
    .fp-pending-msg { margin-top:10px; font-size:13px; color:#7A5A10; background:#FEF9EE; border:1px solid #F5DFA0; border-radius:8px; padding:10px 14px; }
    .picks-link { margin-top:10px; font-size:13px; color:var(--ink-faint); }
    .picks-link a { color:var(--navy); font-weight:600; }

    /* Section */
    .section { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:20px 24px; margin-bottom:24px; }
    .section-title { font-family:'DM Serif Display',serif; font-size:20px; color:var(--navy); margin-bottom:16px; }

    /* Leaderboard */
    .leader-list { display:flex; flex-direction:column; gap:8px; }
    .leader-row { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--cream); border-radius:var(--radius-sm); }
    .leader-row.is-you { background:#EEF2F8; }
    .leader-rank { font-size:13px; color:var(--ink-faint); width:20px; text-align:center; flex-shrink:0; }
    .leader-name { flex:1; font-weight:600; font-size:15px; }
    .leader-you  { font-size:11px; color:var(--ink-faint); font-weight:400; margin-left:6px; }
    .lstatus { font-size:12px; font-weight:600; padding:3px 10px; border-radius:100px; }
    .lstatus-alive    { background:#D4EDDA; color:#155724; }
    .lstatus-dead     { background:#F8D7DA; color:#721C24; }
    .lstatus-freepass { background:#FEF9EE; color:#7A5A10; }
    .leader-picks { font-size:12px; color:var(--ink-faint); flex-shrink:0; }

    /* Monthly grid */
    .grid-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table.mgrid { border-collapse:collapse; min-width:100%; font-size:12px; }
    .mgrid th,.mgrid td { padding:5px 3px; text-align:center; white-space:nowrap; }
    .mgrid .mth { text-align:left; padding-left:8px; font-weight:600; min-width:90px; position:sticky; left:0; background:var(--white); z-index:1; }
    .mgrid .mtd { text-align:left; padding-left:8px; font-size:13px; position:sticky; left:0; background:var(--white); z-index:1; }
    .mgrid .is-you .mtd { color:var(--navy); font-weight:700; }
    .you-tag { font-size:10px; color:var(--ink-faint); font-weight:400; margin-left:4px; }
    .day-hd { color:var(--ink-faint); font-weight:500; font-size:11px; }
    .day-hd.today { color:var(--navy); font-weight:700; }
    .totals-hd,.totals-td { font-size:12px; padding-left:8px; }
    .gc { display:inline-block; border-radius:4px; padding:2px 3px; font-size:10px; font-weight:700; min-width:26px; text-align:center; }
    .gc-win     { background:#D4EDDA; color:#155724; }
    .gc-loss    { background:#F8D7DA; color:#721C24; }
    .gc-fp      { background:#FEF9EE; color:#7A5A10; border:1px solid #F5DFA0; }
    .gc-pending { background:var(--cream-dark); color:var(--ink-faint); }
    .gc-future  { color:var(--cream-dark); }
    .gc-blank   { color:var(--cream-dark); }

    /* iOS touch */
    button,a,[role=button] { -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

    /* Nav badges */
    .nav-badge { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; border-radius:100px; background:var(--red); color:white; font-size:10px; font-weight:700; padding:0 4px; margin-left:4px; vertical-align:middle; }
    .drawer-badge { margin-left:auto; background:var(--red); color:white; font-size:11px; font-weight:700; border-radius:100px; padding:1px 7px; }

    /* Nav */
    #mainNav { position:fixed; top:0; left:0; right:0; background:var(--white); box-shadow:0 1px 3px rgba(0,0,0,.08); z-index:200; height:58px; }
    .nav-inner { max-width:1100px; margin:0 auto; padding:0 24px; height:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .nav-logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--navy); text-decoration:none; white-space:nowrap; flex-shrink:0; }
    .nav-links { display:flex; gap:2px; flex:1; justify-content:center; }
    .nav-link { padding:6px 12px; border-radius:6px; font-size:14px; font-weight:500; color:var(--ink-light); text-decoration:none; white-space:nowrap; }
    @media(hover:hover){.nav-link:hover{background:var(--cream);color:var(--ink);}}
    .nav-link.active { background:var(--navy); color:var(--white); }
    .nav-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .nav-user { font-size:13px; color:var(--ink-faint); white-space:nowrap; max-width:120px; overflow:hidden; text-overflow:ellipsis; }
    .btn-signout { padding:6px 12px; border:1.5px solid var(--cream-dark); border-radius:6px; background:transparent; font-family:inherit; font-size:13px; font-weight:500; color:var(--ink-light); cursor:pointer; white-space:nowrap; }
    @media(hover:hover){.btn-signout:hover{border-color:var(--red);color:var(--red);}}
    .hamburger { display:none; flex-direction:column; justify-content:center; align-items:center; gap:5px; width:36px; height:36px; background:transparent; border:1.5px solid var(--cream-dark); border-radius:8px; cursor:pointer; padding:0; flex-shrink:0; }
    .hamburger span { display:block; width:18px; height:2px; background:var(--ink); border-radius:2px; transition:all .2s; }
    .hamburger[aria-expanded=true] span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger[aria-expanded=true] span:nth-child(2){opacity:0;}
    .hamburger[aria-expanded=true] span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-drawer { position:fixed; top:0; right:0; width:280px; height:100dvh; background:var(--white); z-index:300; transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-4px 0 24px rgba(0,0,0,.12); }
    .mobile-drawer.open { transform:translateX(0); }
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:299; opacity:0; pointer-events:none; transition:opacity .28s; }
    .drawer-overlay.show { opacity:1; pointer-events:all; }
    .drawer-header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:58px; border-bottom:1px solid var(--cream-dark); flex-shrink:0; }
    .drawer-title { font-family:'DM Serif Display',serif; font-size:20px; color:var(--navy); }
    .drawer-close { width:32px; height:32px; border:none; background:var(--cream); border-radius:8px; font-size:16px; cursor:pointer; color:var(--ink-light); display:flex; align-items:center; justify-content:center; }
    .drawer-user { padding:12px 20px; font-size:13px; color:var(--ink-faint); border-bottom:1px solid var(--cream-dark); background:var(--cream); }
    .drawer-nav { flex:1; padding:12px; display:flex; flex-direction:column; gap:4px; overflow-y:auto; }
    .drawer-link { display:flex; align-items:center; gap:14px; padding:13px 16px; border-radius:10px; font-size:16px; font-weight:500; color:var(--ink); text-decoration:none; }
    @media(hover:hover){.drawer-link:hover{background:var(--cream);}}
    .drawer-link.active { background:var(--navy); color:var(--white); }
    .drawer-icon { font-size:20px; width:28px; text-align:center; }
    .drawer-signout { margin:12px; padding:13px; background:transparent; border:1.5px solid var(--cream-dark); border-radius:10px; font-family:inherit; font-size:15px; font-weight:500; color:var(--red); cursor:pointer; flex-shrink:0; }
    @media(max-width:720px){.nav-links{display:none;}.nav-user{display:none;}.btn-signout{display:none;}.hamburger{display:flex;}}
  </style>
</head>
<body>
  <nav id="mainNav"></nav>
  <div class="page-wrap">
    <div class="page-title">💀 Survivor</div>
    <div class="page-subtitle" id="monthBadge"></div>

    <div id="loadingState" class="state-box">
      <div class="spinner"></div>
      <p>Loading survivor…</p>
    </div>

    <div id="mainContent" style="display:none">
      <div id="myStatusSection"></div>
      <div class="section">
        <div class="section-title">🏆 Survivor Board</div>
        <div class="leader-list" id="leaderList"></div>
      </div>
      <div class="section">
        <div class="section-title" id="gridTitle">📅 Weekly Picks</div>
        <div class="grid-wrap"><div id="monthlyGrid"></div></div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp }                        from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getDatabase, ref, get, set, update }  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAWAPwR2Qa4uVYatrSN82gKPwUakVd_yoM",
    authDomain: "nflpickem1728.firebaseapp.com",
    databaseURL: "https://nflpickem1728-default-rtdb.firebaseio.com",
    projectId: "nflpickem1728",
    storageBucket: "nflpickem1728.firebasestorage.app",
    messagingSenderId: "752271833942",
    appId: "1:752271833942:web:3cd773d3e2c8856dedb4f7"
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  // ── Helpers ───────────────────────────────────────────────────────────
  function norm(a) {
    const m = { 'WAS':'WSH', 'JAC':'JAX', 'KAN':'KC', 'NEP':'NE', 'NOS':'NO', 'GNB':'GB', 'SFO':'SF', 'TAM':'TB' };
    const up = (a || '').toUpperCase();
    return m[up] || up || '??';
  }
  function logo(abbrev) {
    return `https://a.espncdn.com/i/teamlogos/nfl/500/${norm(abbrev).toLowerCase()}.png`;
  }

  const NFL_TEAMS = [
    'ARI','ATL','BAL','BUF','CAR','CHI','CIN','CLE','DAL','DEN',
    'DET','GB','HOU','IND','JAX','KC','LAC','LAR','LV','MIA',
    'MIN','NE','NO','NYG','NYJ','PHI','PIT','SEA','SF','TB','TEN','WSH'
  ];

  // ── State ─────────────────────────────────────────────────────────────
  let currentUser = null, isAdmin = false;
  let allMembers = [], allStates = {}, survivorStartWeek = 1;
  let seasonStartDate = null;
  let weekGamesCache = {}; // 'week-N' → { lastStartTime, games, allFinal }

  function seasonKey() {
    return seasonStartDate ? seasonStartDate.slice(0,4) : String(new Date().getFullYear());
  }
  function getCurrentWeek() {
    if (!seasonStartDate) return 1;
    const start = new Date(seasonStartDate + 'T00:00:00');
    const diff  = Math.floor((new Date() - start) / 86400000);
    return Math.max(1, Math.min(18, Math.floor(diff / 7) + 1));
  }

  // ── Nav ───────────────────────────────────────────────────────────────
  function initNav({ activePage, isAdmin = false, userName = '' }) {
    const nav = document.getElementById('mainNav');
    const pages = [
      { href:'picks.html', label:'My Picks', icon:'🎯' },
      { href:'results.html', label:'Results', icon:'📋' },
      { href:'standings.html', label:'Standings', icon:'🏆' },
      { href:'survivor.html', label:'Survivor', icon:'💀' },
      { href:'profile.html', label:'Profile', icon:'🔐' },
    ];
    if (isAdmin) pages.push({ href:'admin.html', label:'Admin', icon:'⚙️' });
    nav.innerHTML = `
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">🏈 NFL Pick Em</a>
        <div class="nav-links">${pages.map(p=>`<a href="${p.href}" class="nav-link${p.href===activePage?' active':''}"${p.href==='admin.html'?' id="adminLink"':''}>${p.label}</a>`).join('')}</div>
        <div class="nav-right">
          <span class="nav-user">${userName}</span>
          <button class="btn-signout" id="signOutBtn">Sign out</button>
          <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
        </div>
      </div>
      <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-header"><span class="drawer-title">🏈 NFL Pick Em</span><button class="drawer-close" id="drawerClose">✕</button></div>
        <div class="drawer-user">${userName}</div>
        <nav class="drawer-nav">${pages.map(p=>`<a href="${p.href}" class="drawer-link${p.href===activePage?' active':''}"${p.href==='admin.html'?' id="drawerAdminLink"':''}><span class="drawer-icon">${p.icon}</span>${p.label}</a>`).join('')}</nav>
        <button class="drawer-signout" id="drawerSignOutBtn">Sign out</button>
      </div>
      <div class="drawer-overlay" id="drawerOverlay"></div>`;
    const hb = document.getElementById('hamburgerBtn');
    const dr = document.getElementById('mobileDrawer');
    const ov = document.getElementById('drawerOverlay');
    const cb = document.getElementById('drawerClose');
    const open  = ()=>{ dr.classList.add('open'); ov.classList.add('show'); hb.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; };
    const close = ()=>{ dr.classList.remove('open'); ov.classList.remove('show'); hb.setAttribute('aria-expanded','false'); document.body.style.overflow=''; };
    hb.addEventListener('click', open); cb.addEventListener('click', close); ov.addEventListener('click', close);
    dr.querySelectorAll('.drawer-link').forEach(l=>l.addEventListener('click',close));
  }

  async function checkPendingFP() {
    try {
      const snap = await get(ref(db, `survivor/${seasonKey()}`));
      if (!snap.exists()) return;
      let n = 0;
      snap.forEach(c=>{ const v=c.val(); if(v&&v.freePassRequested&&!v.freePassUsed) n++; });
      ['adminLink','drawerAdminLink'].forEach(id=>{
        const el = document.getElementById(id); if(!el) return;
        el.querySelectorAll('.nav-badge,.drawer-badge').forEach(b=>b.remove());
        if(n>0){ const b=document.createElement('span'); b.className=id==='drawerAdminLink'?'drawer-badge':'nav-badge'; b.textContent=n; el.appendChild(b); }
      });
    } catch(e){}
  }

  // ── Compute status (pure function, no Firebase writes) ────────────────
  function computeStatus(usedTeams, fpUsed, fpWeek, weekGames, startWeek, upToWeek) {
    if (!usedTeams) usedTeams = {};
    let alive=true, eliminatedWeek=null, eliminatedReason=null;

    const pickWeeks = Object.keys(usedTeams).map(k => parseInt(k.split('-')[1])).sort((a,b)=>a-b);
    const effectiveStartWeek = pickWeeks.length > 0 ? Math.max(startWeek, pickWeeks[0]) : startWeek;

    for (let w=effectiveStartWeek; w<=upToWeek; w++) {
      const wk = `week-${w}`;
      const wd = weekGames[wk]; if (!wd) continue;
      if (new Date() < wd.lastStartTime) continue;
      const pick = usedTeams[wk];
      if (!pick) {
        if (w === upToWeek && pickWeeks.length === 0) break;
        alive=false; eliminatedWeek=w; eliminatedReason='missed'; break;
      }
      const np = norm(pick);
      const game = wd.games.find(g => norm(g.homeTeam?.abbrev)===np || norm(g.awayTeam?.abbrev)===np);
      if (!game || game.statusName!=='STATUS_FINAL' || !game.winnerId) continue;
      const homeWon = String(game.winnerId)===String(game.homeTeam?.id);
      const won = homeWon ? norm(game.homeTeam.abbrev)===np : norm(game.awayTeam.abbrev)===np;
      if (!won) {
        if (fpUsed && Number(fpWeek)===w) continue; // FP approved for this week
        alive=false; eliminatedWeek=w; eliminatedReason='loss'; break;
      }
    }
    return { alive, eliminatedWeek, eliminatedReason };
  }

  function getPickResult(pick, games) {
    if (!pick || !games?.length) return null;
    const np = norm(pick);
    const g  = games.find(g => norm(g.homeTeam?.abbrev)===np || norm(g.awayTeam?.abbrev)===np);
    if (!g) return null;
    if (g.statusName!=='STATUS_FINAL') return 'pending';
    if (!g.winnerId) return 'pending';
    const homeWon = String(g.winnerId)===String(g.homeTeam?.id);
    const won = homeWon ? norm(g.homeTeam.abbrev)===np : norm(g.awayTeam.abbrev)===np;
    return won ? 'win' : 'loss';
  }

  // ── Fetch games from ESPN ─────────────────────────────────────────────
  async function fetchWeekGames(week) {
    try {
      const year = seasonKey();
      const res  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?dates=${year}&seasontype=2&week=${week}`);
      const data = await res.json();
      const games = [];
      for (const ev of (data?.events||[])) {
        const comp = ev.competitions?.[0]; if (!comp) continue;
        const home = comp.competitors?.find(c=>c.homeAway==='home');
        const away = comp.competitors?.find(c=>c.homeAway==='away');
        if (!home||!away) continue;
        const statusName = ev.status?.type?.name||'STATUS_SCHEDULED';
        let winnerId = null;
        if (statusName==='STATUS_FINAL') {
          if (home.winner) winnerId=String(home.team.id);
          else if (away.winner) winnerId=String(away.team.id);
          else if (home.score!=null&&away.score!=null)
            winnerId = parseInt(home.score)>parseInt(away.score) ? String(home.team.id) : String(away.team.id);
        }
        games.push({ id:ev.id, startTime: comp.date || ev.date, statusName,
          homeTeam:{ id:String(home.team.id), abbrev:norm(home.team.abbreviation) },
          awayTeam:{ id:String(away.team.id), abbrev:norm(away.team.abbreviation) },
          homeScore:home.score??null, awayScore:away.score??null, winnerId });
      }
      games.sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
      if (games.length) {
        const obj={}; for(const g of games) obj[g.id]=g;
        await set(ref(db,`games/week-${week}`),obj).catch(()=>{});
      }
      return games;
    } catch(e) { return []; }
  }

  async function loadSeasonWeekGames(upToWeek) {
    const wg = {};
    try {
      for (let w = 1; w <= upToWeek; w++) {
        const wk = `week-${w}`;
        const snap = await get(ref(db, `games/${wk}`));
        if (snap.exists()) {
          const games = Object.entries(snap.val()).filter(([k])=>k!=='_cachedAt').map(([,v])=>v)
            .sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
          if (games.length) wg[wk] = { lastStartTime:new Date(games[games.length-1].startTime), games, allFinal:games.every(g=>g.statusName==='STATUS_FINAL') };
        }
      }
    } catch(e){}
    // Re-fetch non-final weeks + current week
    const toFetch = new Set([upToWeek]);
    for (let w = 1; w <= upToWeek; w++) { if (!wg[`week-${w}`] || !wg[`week-${w}`].allFinal) toFetch.add(w); }
    await Promise.all([...toFetch].map(async w => {
      const games = await fetchWeekGames(w);
      if (games.length) wg[`week-${w}`] = { lastStartTime:new Date(games[games.length-1].startTime), games, allFinal:games.every(g=>g.statusName==='STATUS_FINAL') };
    }));
    return wg;
  }

  // ── Render status card ────────────────────────────────────────────────
  function renderMyStatus(myState, weekGames, week) {
    const section  = document.getElementById('myStatusSection');
    const wk       = `week-${week}`;
    const picks    = myState.usedTeams || {};
    const weekPick = picks[wk];
    const result   = getPickResult(weekPick, weekGames);
    const pickCount = Object.keys(picks).length;

    let cardClass='alive', icon='✅', title="You're Alive!";
    let subtitle = `Week ${week} · ${pickCount} pick${pickCount!==1?'s':''} made`;
    const lostThisWeek = result === 'loss';
    const fpUsed    = myState.freePassUsed;
    const fpReq     = myState.freePassRequested && !myState.freePassUsed;

    if (!myState.alive) {
      cardClass='dead'; icon='💀'; title='Eliminated';
      const why = myState.eliminatedReason==='missed' ? 'missed a pick' : 'team lost';
      subtitle = myState.eliminatedWeek ? `Eliminated week ${myState.eliminatedWeek} (${why})` : 'Better luck next season';
    } else if (fpUsed) {
      cardClass='freepass'; icon='🎟️'; title='Alive — Free Pass Used';
      subtitle = `Free pass used week ${myState.freePassWeek}`;
    } else if (lostThisWeek && !fpUsed) {
      cardClass='dead'; icon='❌';
      title = fpReq ? 'Loss — Free Pass Requested' : 'Loss — Request Free Pass';
      subtitle = fpReq ? 'Awaiting admin approval' : `Week ${week}`;
    }

    const fpNote = myState.freePassUsed
      ? `<span class="fp-note" style="color:var(--ink-faint)">🎟️ FP used week ${myState.freePassWeek}</span>`
      : myState.freePassRequested
        ? `<span class="fp-note" style="color:#7A5A10">⏳ FP requested</span>`
        : myState.alive
          ? `<span class="fp-note" style="color:var(--green)">🎟️ FP available</span>`
          : '';

    let pickHTML = '';
    if (weekPick) {
      const bc = result==='win' ? 'win' : result==='loss' ? 'loss' : 'pending';
      const bl = result==='win' ? '✅ Win'
        : result==='loss'
          ? (myState.freePassUsed && Number(myState.freePassWeek)===week ? '🎟️ FP saved you'
            : myState.freePassRequested ? '⏳ FP requested' : '❌ Loss')
          : '⏳ Pending';
      const showBtn = result==='loss' && myState.alive && !myState.freePassUsed && !myState.freePassRequested;
      const showMsg = myState.freePassRequested && !myState.freePassUsed;
      pickHTML = `
        <div class="pick-result-row">
          <img class="pick-logo" src="${logo(weekPick)}" onerror="this.style.display='none'" />
          <span class="pick-team-name">${norm(weekPick)}</span>
          <span class="result-badge ${bc}">${bl}</span>
        </div>
        ${showBtn ? `<button class="btn-fp" id="reqFPBtn">🎟️ Request Free Pass</button>` : ''}
        ${showMsg ? `<div class="fp-pending-msg">⏳ Free pass requested — awaiting admin approval</div>` : ''}`;
    } else {
      pickHTML = `<div class="picks-link">Make your pick on the <a href="picks.html">My Picks</a> page.</div>`;
    }

    section.innerHTML = `
      <div class="status-card ${cardClass}">
        <div class="status-top">
          <div class="status-left">
            <div class="status-icon">${icon}</div>
            <div><div class="status-title">${title}</div><div class="status-subtitle">${subtitle}</div></div>
          </div>
          ${fpNote}
        </div>
        ${pickHTML}
      </div>`;

    document.getElementById('reqFPBtn')?.addEventListener('click', async () => {
      const btn = document.getElementById('reqFPBtn');
      btn.disabled=true; btn.textContent='Requesting…';
      try {
        await update(ref(db), {
          [`survivor/${seasonKey()}/${currentUser.uid}/freePassRequested`]: true,
          [`survivor/${seasonKey()}/${currentUser.uid}/freePassWeek`]: week,
        });
        myState.freePassRequested=true; myState.freePassWeek=week;
        renderMyStatus(myState, weekGames, week);
      } catch(e) { btn.disabled=false; btn.textContent='🎟️ Request Free Pass'; }
    });
  }

  // ── Render leaderboard ────────────────────────────────────────────────
  function renderLeaderboard(weekGames, week, startWeek) {
    const rows = allMembers.map(m => {
      const raw = allStates[m.uid] || {};
      const ut = raw.usedTeams || {};
      const c  = computeStatus(ut, raw.freePassUsed, raw.freePassWeek, weekGames, startWeek, week);
      return { ...m, alive:c.alive, fpUsed:raw.freePassUsed, fpReq:raw.freePassRequested, picks:Object.keys(ut).length };
    });
    rows.sort((a,b) => { if(a.alive!==b.alive) return a.alive?-1:1; return b.picks-a.picks; });
    document.getElementById('leaderList').innerHTML = rows.map((r,i) => {
      let sc='lstatus-alive', st='✅ Alive';
      if (!r.alive)   { sc='lstatus-dead'; st='💀 Out'; }
      else if (r.fpUsed) { sc='lstatus-freepass'; st='🎟️ Alive (FP used)'; }
      else if (r.fpReq)  { sc='lstatus-freepass'; st='⏳ FP Requested'; }
      return `<div class="leader-row${r.uid===currentUser.uid?' is-you':''}">
        <span class="leader-rank">${i+1}</span>
        <span class="leader-name">${r.displayName||r.email}${r.uid===currentUser.uid?'<span class="leader-you">(you)</span>':''}</span>
        <span class="lstatus ${sc}">${st}</span>
        <span class="leader-picks">${r.picks} pick${r.picks!==1?'s':''}</span>
      </div>`;
    }).join('');
  }

  // ── Render weekly grid ────────────────────────────────────────────────
  function renderWeeklyGrid(weekGames, curWeek, defaultStartWeek) {
    const members = [...allMembers].sort((a,b)=>{
      if(a.uid===currentUser.uid) return -1;
      if(b.uid===currentUser.uid) return 1;
      return (a.displayName||'').localeCompare(b.displayName||'');
    });

    // Start grid from earliest actual pick week across all members
    const allPickWeeks = [];
    for (const m of members) {
      const ut = allStates[m.uid]?.usedTeams || {};
      Object.keys(ut).forEach(k => allPickWeeks.push(parseInt(k.split('-')[1])));
    }
    const gridStartWeek = allPickWeeks.length > 0 ? Math.min(...allPickWeeks) : defaultStartWeek;

    const weeks = [];
    for (let w=gridStartWeek; w<=curWeek; w++) weeks.push(w);

    const t = document.createElement('table'); t.className='mgrid';
    const thead = t.createTHead(); const hr = thead.insertRow();
    const mh = document.createElement('th'); mh.className='mth'; mh.textContent='Member'; hr.appendChild(mh);
    for (const w of weeks) {
      const th=document.createElement('th'); th.className=`day-hd${w===curWeek?' today':''}`;
      th.textContent=`W${w}`; hr.appendChild(th);
    }
    const tot=document.createElement('th'); tot.className='totals-hd'; tot.textContent='W–L'; hr.appendChild(tot);

    const tbody=t.createTBody();
    for (const m of members) {
      const raw = allStates[m.uid]||{};
      const hasPicks = raw.usedTeams && Object.keys(raw.usedTeams).length>0;
      const ut  = hasPicks ? (raw.usedTeams||{}) : {};
      const fpU = raw.freePassUsed||false;
      const fpW = raw.freePassWeek||null;
      const fpR = raw.freePassRequested||false;
      const isYou = m.uid===currentUser.uid;
      const row=tbody.insertRow(); if(isYou) row.className='is-you';
      const ntd=row.insertCell(); ntd.className='mtd';
      ntd.innerHTML=`${m.displayName||m.email}${isYou?'<span class="you-tag">(you)</span>':''}`;
      let wins=0, losses=0;
      for (const w of weeks) {
        const wk = `week-${w}`;
        const td=row.insertCell();
        const pick=ut[wk];
        const wd=weekGames[wk];
        const isFuture=w>curWeek;
        const unlocked = wd ? new Date() >= wd.lastStartTime : w < curWeek;
        let cell='';
        if (isFuture) {
          cell=`<span class="gc-future">·</span>`;
        } else if (!pick) {
          cell = (unlocked && hasPicks) ? `<span class="gc gc-loss" title="No pick">✗</span>` : `<span class="gc-blank">—</span>`;
          if (unlocked && hasPicks) losses++;
        } else if (!unlocked) {
          cell=`<span class="gc gc-pending">🔒</span>`;
        } else {
          const r=getPickResult(pick, wd?.games||[]);
          const label=norm(pick);
          if (r==='win') { wins++; cell=`<span class="gc gc-win">${label}</span>`; }
          else if (r==='loss') {
            losses++;
            if (Number(fpW)===w && fpU) cell=`<span class="gc gc-fp">🎟️${label}</span>`;
            else if (Number(fpW)===w && fpR) cell=`<span class="gc gc-fp">⏳${label}</span>`;
            else cell=`<span class="gc gc-loss">${label}</span>`;
          } else { cell=`<span class="gc gc-pending">${label}</span>`; }
        }
        td.innerHTML=cell;
      }
      const totTd=row.insertCell(); totTd.className='totals-td';
      totTd.innerHTML = wins>0||losses>0
        ? `<span style="color:var(--green)">${wins}</span><span style="color:var(--ink-faint)">–</span><span style="color:var(--red)">${losses}</span>`
        : `<span style="color:var(--ink-faint)">—</span>`;
    }
    const grid=document.getElementById('monthlyGrid'); grid.innerHTML=''; grid.appendChild(t);
  }

  // ── Load everything ───────────────────────────────────────────────────
  async function loadSurvivor() {
    const season = seasonKey();
    document.getElementById('monthBadge').textContent = `${season} Season`;
    try {
      // Settings
      const ss = await get(ref(db,'adminConfig/settings'));
      const ss_val = ss.exists() ? ss.val() : {};
      survivorStartWeek = ss_val.survivorStartWeek || 1;

      const week = getCurrentWeek();

      // Members
      const ms = await get(ref(db,'adminConfig/members'));
      allMembers=[];
      if (ms.exists()) ms.forEach(c=>{ if(c.val().approved) allMembers.push({uid:c.key,...c.val()}); });

      // Survivor states — skip null/empty records from reset
      const sv = await get(ref(db,`survivor/${season}`));
      allStates={};
      if (sv.exists()) sv.forEach(c=>{ const v=c.val(); if(v&&typeof v==='object') allStates[c.key]=v; });

      // My state
      const myRaw = allStates[currentUser.uid]||{};
      const myBase = {
        alive: true, freePassUsed: false, freePassRequested: false,
        freePassWeek: null, usedTeams: {},
        ...myRaw
      };

      // Games — all weeks up to current
      const weekGames = await loadSeasonWeekGames(week);
      weekGamesCache = weekGames;

      // Compute my status
      const c = computeStatus(myBase.usedTeams, myBase.freePassUsed, myBase.freePassWeek, weekGames, survivorStartWeek, week);
      const myState = { ...myBase, ...c };

      // Show
      document.getElementById('loadingState').style.display='none';
      document.getElementById('mainContent').style.display='';
      renderMyStatus(myState, weekGames[`week-${week}`]?.games || [], week);
      renderLeaderboard(weekGames, week, survivorStartWeek);
      renderWeeklyGrid(weekGames, week, survivorStartWeek);

    } catch(err) {
      console.error(err);
      document.getElementById('loadingState').innerHTML=`<div class="icon">⚠️</div><h3>Could not load survivor</h3><p style="font-size:13px">${err.message}</p>`;
    }
  }

  // ── Auth ──────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href='index.html'; return; }
    currentUser=user;
    const ms = await get(ref(db,`adminConfig/members/${user.uid}`));
    const member = ms.exists() ? ms.val() : null;
    const as = await get(ref(db,`adminConfig/admins/${user.uid}`));
    isAdmin=as.exists();
    if (!member?.approved && !isAdmin) { window.location.href='index.html'; return; }
    initNav({ activePage:'survivor.html', isAdmin, userName:member?.displayName||user.email });

    const settingsSnap = await get(ref(db, 'adminConfig/settings'));
    const settings = settingsSnap.exists() ? settingsSnap.val() : {};
    seasonStartDate = settings.seasonStartDate || null;

    checkPendingFP();
    const so = ()=>signOut(auth).then(()=>window.location.href='index.html');
    document.getElementById('signOutBtn')?.addEventListener('click',so);
    document.getElementById('drawerSignOutBtn')?.addEventListener('click',so);
    await loadSurvivor();
  });
</script>
