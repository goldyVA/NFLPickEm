<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Picks · MLB Pick'em</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F7F5F0;
      --cream-dark:  #EDEAE2;
      --ink:         #1A1A1A;
      --ink-light:   #555550;
      --ink-faint:   #999990;
      --navy:        #1B3A5C;
      --red:         #C0392B;
      --green:       #27AE60;
      --accent:      #E8A838;
      --white:       #FFFFFF;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,.10);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.13);
      --radius:      12px;
      --radius-sm:   8px;
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }



















    /* ── Page body ───────────────────────────── */
    .page-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 82px 24px 48px;
    }

    /* ── Page header ─────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--navy);
      line-height: 1.1;
    }

    .page-header p {
      font-size: 14px;
      color: var(--ink-faint);
      margin-top: 4px;
    }

    /* ── Date selector ───────────────────────── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-btn {
      width: 34px; height: 34px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--ink-light);
      transition: border-color .15s, color .15s;
    }
    .date-btn:hover { border-color: var(--navy); color: var(--navy); }

    .date-display {
      padding: 7px 16px;
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      min-width: 140px;
      text-align: center;
      cursor: pointer;
      position: relative;
    }

    .date-display input[type="date"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
    }

    /* ── Summary bar ─────────────────────────── */
    .summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--ink-light);
    }

    .summary-chip strong { color: var(--ink); }

    /* ── Game cards ──────────────────────────── */
    .games-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .game-card {
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }

    .game-card:hover { box-shadow: var(--shadow-md); }

    /* locked / final states */
    .game-card.locked  { border-color: #D4CAB8; }
    .game-card.correct { border-color: #A8D5B5; background: #F4FBF6; }
    .game-card.wrong   { border-color: #F0C4C0; background: #FDF5F4; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--cream-dark);
      background: var(--cream);
    }

    .game-time { font-size: 12px; font-weight: 600; color: var(--ink-light); text-transform: uppercase; letter-spacing: .04em; }

    .game-status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .badge-upcoming { background: #EEF2F8; color: var(--navy); }
    .badge-live     { background: #FDECEA; color: var(--red); }
    .badge-final    { background: var(--cream-dark); color: var(--ink-faint); }

    .card-body {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
    }

    /* Team side */
    .team-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .team-logo {
      width: 56px; height: 56px;
      object-fit: contain;
    }

    .team-logo-placeholder {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--cream-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .team-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }

    .team-record {
      font-size: 12px;
      color: var(--ink-faint);
    }

    .pitcher-stat {
      font-size: 11px;
      color: var(--ink-faint);
      font-weight: 400;
    }

    .team-pitcher {
      font-size: 11.5px;
      color: var(--ink-light);
      margin-top: 2px;
      line-height: 1.5;
    }

    /* Middle VS / score */
    .card-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .vs-text {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--ink-faint);
    }

    .score-display {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      letter-spacing: .04em;
    }

    .at-label {
      font-size: 11px;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* Pick section */
    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--cream-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pick-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-light);
      white-space: nowrap;
    }

    .pick-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .pick-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      background: var(--white);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .pick-btn img {
      width: 20px; height: 20px;
      object-fit: contain;
    }

    /* Hover only on devices that support it (not touch), skip already-selected */
    @media (hover: hover) {
      .pick-btn:hover:not(:disabled):not(.selected) {
        border-color: var(--navy);
        color: var(--navy);
        background: #EEF2F8;
      }
    }

    /* Active state works on all devices including touch */
    .pick-btn:active:not(:disabled):not(.selected) {
      border-color: var(--navy);
      color: var(--navy);
      background: #EEF2F8;
      transform: scale(.97);
    }

    .pick-btn.selected {
      border-color: var(--navy);
      background: var(--navy) !important;
      color: var(--white) !important;
    }

    .pick-btn.selected:active {
      background: #152e4a !important;
      transform: scale(.97);
    }

    .pick-btn:disabled {
      cursor: not-allowed;
      opacity: .6;
    }

    /* Result indicators */
    .result-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .result-indicator.correct { color: var(--green); }
    .result-indicator.wrong   { color: var(--red); }

    .lock-msg {
      font-size: 12px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── States ──────────────────────────────── */
    .state-box {
      text-align: center;
      padding: 64px 24px;
      color: var(--ink-faint);
    }

    .state-box .icon { font-size: 48px; margin-bottom: 16px; }
    .state-box h3    { font-size: 18px; color: var(--ink-light); margin-bottom: 8px; }
    .state-box p     { font-size: 14px; line-height: 1.5; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--cream-dark);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }


    /* Auto-pick indicator */
    .auto-pick-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--ink-faint);
      background: var(--cream-dark);
      border-radius: 100px;
      padding: 2px 8px;
      margin-left: 6px;
    }

    /* ── Mobile ──────────────────────────────── */
    @media (max-width: 600px) {
  
      .page-header { flex-direction: column; align-items: flex-start; }
      .card-body {
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
      }
      .team-logo { width: 44px; height: 44px; }
      .team-name { font-size: 13px; }
      .pick-btn  { padding: 7px 10px; font-size: 12px; }
    }

    /* ── Survivor section ────────────────────── */
    .survivor-section {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 2px solid var(--cream-dark);
    }

    .survivor-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .survivor-section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--navy);
    }

    .survivor-section-sub {
      font-size: 13px;
      color: var(--ink-faint);
      margin-top: 3px;
    }

    .survivor-status-card {
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
    }

    .survivor-status-card.s-alive  { border-color: #A8D5B5; background: linear-gradient(135deg,#F0FBF4 0%,var(--white) 50%); }
    .survivor-status-card.s-dead   { border-color: #F0C4C0; background: linear-gradient(135deg,#FDF0EF 0%,var(--white) 50%); }
    .survivor-status-card.s-freepass { border-color: #F5DFA0; background: linear-gradient(135deg,#FEF9EE 0%,var(--white) 50%); }

    .s-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .s-top-left { display: flex; align-items: center; gap: 14px; }
    .s-icon { font-size: 36px; line-height: 1; }

    .s-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
    }

    .s-sub {
      font-size: 12px;
      color: var(--ink-faint);
      margin-top: 2px;
    }

    .s-pick-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .s-pick-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-light);
    }

    .s-current-pick {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      transition: background .2s, border-color .2s;
    }

    .s-current-pick.pick-win {
      background: #EFF6F2;
      border-color: #A8D5B5;
      color: #1D6A3E;
    }

    .s-current-pick.pick-loss {
      background: #FDF0EF;
      border-color: #F0C4C0;
      color: var(--red);
    }

    .s-current-pick.pick-pending {
      background: var(--cream);
      border-color: var(--cream-dark);
    }

    .s-current-pick img { width: 26px; height: 26px; object-fit: contain; }

    .s-result-win     { color: var(--green); font-size: 13px; font-weight: 700; }
    .s-result-loss    { color: var(--red);   font-size: 13px; font-weight: 700; }
    .s-result-pending { color: var(--ink-faint); font-size: 13px; }

    .s-team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .s-team-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      background: var(--white);
      cursor: pointer;
      transition: all .15s;
      position: relative;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
    }

    .s-team-tile img { width: 30px; height: 30px; object-fit: contain; }

    .s-team-tile:hover:not(.s-used):not(.s-selected) {
      border-color: var(--navy);
      box-shadow: var(--shadow-sm);
    }

    .s-team-tile.s-selected {
      border-color: var(--navy);
      background: var(--navy);
      color: var(--white);
    }

    .s-team-tile.s-used {
      opacity: .38;
      cursor: not-allowed;
      background: var(--cream);
    }

    .s-used-dot {
      position: absolute;
      top: 3px; right: 3px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--ink-faint);
    }

    .s-confirm-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .s-selected-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      flex: 1;
    }

    .s-confirm-btn {
      padding: 9px 20px;
      background: var(--navy);
      color: var(--white);
      border: 1.5px solid var(--navy);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    @media (hover: hover) { .s-confirm-btn:hover { background: #152e4a; border-color: #152e4a; } }
    .s-confirm-btn:active { background: #152e4a; }
    .s-confirm-btn:disabled { opacity: .5; cursor: not-allowed; }

    .s-cancel-btn {
      padding: 9px 20px;
      background: transparent;
      color: var(--ink-light);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    @media (hover: hover) { .s-cancel-btn:hover { border-color: var(--red); color: var(--red); } }
    .s-cancel-btn:active { border-color: var(--red); color: var(--red); }

    .s-freepass-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--accent);
      border-radius: var(--radius-sm);
      background: #FEF9EE;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #7A5A10;
      cursor: pointer;
      transition: all .15s;
    }
    .s-freepass-btn:hover { background: var(--accent); color: var(--white); }
    .s-freepass-btn:disabled { opacity: .5; cursor: not-allowed; }

    .s-msg {
      margin-top: 10px;
      padding: 9px 13px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: none;
    }
    .s-msg.show  { display: block; }
    .s-msg.error { background: #FDF0EF; color: var(--red); border: 1px solid #F5C6C2; }
    .s-msg.info  { background: #EFF6F2; color: #1D6A3E; border: 1px solid #B8DFCA; }

    .view-survivor-link {
      font-size: 13px;
      color: var(--navy);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .view-survivor-link:hover { text-decoration: underline; }


  /* ── Nav base ─────────────────────────────── */
  #mainNav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--white);
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    z-index: 200;
    height: 58px;
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    gap: 2px;
    flex: 1;
    justify-content: center;
  }

  .nav-link {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-light);
    text-decoration: none;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }

  .nav-link:hover  { background: var(--cream); color: var(--ink); }
  .nav-link.active { background: var(--navy); color: var(--white); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .nav-user {
    font-size: 13px;
    color: var(--ink-faint);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-signout {
    padding: 6px 12px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 6px;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }

  .btn-signout:hover { border-color: var(--red); color: var(--red); }

  /* ── Hamburger ────────────────────────────── */
  .hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: transparent;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }

  .hamburger span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--ink);
    border-radius: 2px;
    transition: all .2s ease;
  }

  .hamburger[aria-expanded="true"] span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  .hamburger[aria-expanded="true"] span:nth-child(2) {
    opacity: 0;
  }
  .hamburger[aria-expanded="true"] span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  /* ── Mobile drawer ────────────────────────── */
  .mobile-drawer {
    position: fixed;
    top: 0; right: 0;
    width: 280px;
    height: 100dvh;
    background: var(--white);
    z-index: 300;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 24px rgba(0,0,0,.12);
  }

  .mobile-drawer.open { transform: translateX(0); }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 299;
    opacity: 0;
    pointer-events: none;
    transition: opacity .28s ease;
  }

  .drawer-overlay.show { opacity: 1; pointer-events: all; }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 58px;
    border-bottom: 1px solid var(--cream-dark);
    flex-shrink: 0;
  }

  .drawer-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
  }

  .drawer-close {
    width: 32px; height: 32px;
    border: none;
    background: var(--cream);
    border-radius: 8px;

    };
    return { ...g, homePitcher: normPitcher(g.homePitcher), awayPitcher: normPitcher(g.awayPitcher) };
  }

  async function fetchGamesFromESPN(dateStr) {
    const res  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard?dates=${dateToESPN(dateStr)}`);
    const data = await res.json();
    const games = parseESPN(data).sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
    // Write to Firebase cache
    if (games.length > 0) {
      const cacheObj = {};
      for (const g of games) cacheObj[g.id] = g;
      await set(ref(db, `games/${dateStr}`), cacheObj).catch(() => {});
    }
    return games;
  }

  async function loadGames(dateStr) {
    const container  = document.getElementById('gamesContainer');
    const summaryBar = document.getElementById('summaryBar');
    summaryBar.style.display = 'none';
    container.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Loading games…</p></div>`;

    // Clear timers
    Object.values(lockTimers).forEach(clearTimeout);
    lockTimers = {};
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

    let games = [];
    const isToday = dateStr === todayStr();

    try {
      if (isToday) {
        // Always fetch live from ESPN for today, fall back to Firebase cache if ESPN fails
        try {
          games = await fetchGamesFromESPN(dateStr);
        } catch (espnErr) {
          console.warn('ESPN fetch failed for today, trying Firebase cache:', espnErr);
          const dbSnap = await get(ref(db, `games/${dateStr}`));
          if (dbSnap.exists()) {
            games = Object.values(dbSnap.val())
              .map(g => normalizeCachedGame(g))
              .sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
          } else {
            throw espnErr; // no cache either, surface the error
          }
        }
      } else {
        // Past/future dates: use cache only if all games are final, otherwise re-fetch
        const dbSnap = await get(ref(db, `games/${dateStr}`));
        const allFinal = dbSnap.exists() &&
          Object.values(dbSnap.val()).every(g => g.statusName === 'STATUS_FINAL');
        if (allFinal) {
          games = Object.values(dbSnap.val())
            .map(g => normalizeCachedGame(g))
            .sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
        } else {
          games = await fetchGamesFromESPN(dateStr);
        }
      }
    } catch (err) {
      console.error('Failed to load games:', err.message, err);
      container.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><h3>Could not load games</h3><p>${err.message || 'Check your connection and try again.'}</p></div>`;
      return;
    }

    gamesCache = {};
    for (const g of games) gamesCache[g.id] = g;

    if (games.length === 0) {
      container.innerHTML = `<div class="state-box"><div class="icon">🏟️</div><h3>No games scheduled</h3><p>Enjoy the off day!</p></div>`;
      return;
    }

    // Load user picks
    await loadUserPicks(dateStr);

    renderGames(games, dateStr);
    updateSummary(games);

    // Survivor section
    if (isToday) {
      loadSurvivorSection(games);
    } else {
      document.getElementById('survivorSection').style.display = 'none';
    }

    // Poll every 5 minutes while any game is not final (today only)
    if (isToday) {
      const hasActive = games.some(g => g.statusName !== 'STATUS_FINAL');
      if (hasActive) {
        pollInterval = setInterval(async () => {
          try {
            const fresh = await fetchGamesFromESPN(dateStr);
            if (!fresh.length) return;
            for (const g of fresh) gamesCache[g.id] = g;
            await loadUserPicks(dateStr);
            renderGames(fresh, dateStr);
            updateSummary(fresh);
            loadSurvivorSection(fresh);
            // Stop polling once all games are final
            if (fresh.every(g => g.statusName === 'STATUS_FINAL')) {
              clearInterval(pollInterval);
              pollInterval = null;
            }
          } catch (e) { console.warn('Poll failed:', e); }
        }, 3 * 60 * 1000); // every 3 minutes
      }
    }
  }

  // ── Load picks ────────────────────────────────────────────────────────
  async function loadUserPicks(dateStr) {
    if (!currentUser) return;
    const snap = await get(ref(db, `picks/${currentUser.uid}/${dateStr}`));
    userPicks = snap.exists() ? snap.val() : {};
  }

  // ── Save pick ─────────────────────────────────────────────────────────
  async function savePick(dateStr, gameId, teamId) {
    if (!currentUser) return;
    const pickRef = ref(db, `picks/${currentUser.uid}/${dateStr}/${gameId}`);
    await set(pickRef, { teamId, lockedIn: true, correct: null });

    userPicks[gameId].teamId = teamId;

  // ── Render ─────────────────────────────────────────────────────────────
  function renderGames(games, dateStr) {
    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    const grid = document.createElement('div');
    grid.className = 'games-grid';

    for (const game of games) {
      grid.appendChild(buildCard(game, dateStr));
    }

    container.appendChild(grid);
  }

  function buildCard(game, dateStr) {
    const locked   = gameIsLocked(game.startTime);
    const isFinal  = game.statusName === 'STATUS_FINAL';
    const isLive   = game.statusName === 'STATUS_IN_PROGRESS';
    const userPick = userPicks[game.id]?.teamId || null;

    // Determine correct/wrong
    let resultClass = '';
    let correct = null;
    if (isFinal && game.winnerId && userPick) {
      correct = didPickWin(userPick, game);
      resultClass = correct ? 'correct' : 'wrong';
    }

    const card = document.createElement('div');
    card.className = `game-card ${locked ? 'locked' : ''} ${resultClass}`;
    card.dataset.gameId = game.id;

    // Status badge
    let badgeClass = 'badge-upcoming';
    let badgeText  = formatGameTime(game.startTime);
    if (isFinal) { badgeClass = 'badge-final'; badgeText = 'Final'; }
    else if (isLive) { badgeClass = 'badge-live'; badgeText = game.statusShort || 'Live'; }

    // Score or VS
    const midContent = (isFinal || isLive)
      ? `<div class="score-display">${game.awayScore ?? '–'} – ${game.homeScore ?? '–'}</div>`
      : `<div class="vs-text">vs</div>`;

    // Team logo helper
    const logoHtml = (team) => `
      <img class="team-logo"
           src="${espnLogoUrl(team.abbrev.toLowerCase())}"
           alt="${team.name}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div class="team-logo-placeholder" style="display:none">⚾</div>`;

    card.innerHTML = `
      <div class="card-header">
        <span class="game-time">${badgeText}</span>
        <span class="game-status-badge ${badgeClass}">${isFinal ? 'Final' : isLive ? '🔴 Live' : 'Upcoming'}</span>
      </div>

      <div class="card-body">
        <div class="team-side">
          ${logoHtml(game.awayTeam)}
          <div class="team-name">${game.awayTeam.name}</div>
          <div class="team-record">${game.awayTeam.record}</div>
          ${game.awayPitcher ? `<div class="team-pitcher">SP: ${typeof game.awayPitcher === 'object' ? game.awayPitcher.name : game.awayPitcher}${typeof game.awayPitcher === 'object' && (game.awayPitcher.record || game.awayPitcher.era) ? `<br><span class="pitcher-stat">${[game.awayPitcher.record, game.awayPitcher.era ? game.awayPitcher.era+' ERA' : null].filter(Boolean).join(' · ')}</span>` : ''}</div>` : ''}
        </div>

        <div class="card-mid">
          ${midContent}
          <div class="at-label">@ ${game.homeTeam.abbrev}</div>
        </div>

        <div class="team-side">
          ${logoHtml(game.homeTeam)}
          <div class="team-name">${game.homeTeam.name}</div>
          <div class="team-record">${game.homeTeam.record}</div>
          ${game.homePitcher ? `<div class="team-pitcher">SP: ${typeof game.homePitcher === 'object' ? game.homePitcher.name : game.homePitcher}${typeof game.homePitcher === 'object' && (game.homePitcher.record || game.homePitcher.era) ? `<br><span class="pitcher-stat">${[game.homePitcher.record, game.homePitcher.era ? game.homePitcher.era+' ERA' : null].filter(Boolean).join(' · ')}</span>` : ''}</div>` : ''}
        </div>
      </div>

      <div class="card-footer" id="footer-${game.id}">
        ${buildFooter(game, locked, isFinal, userPick, correct)}
      </div>
    `;

    // Pick button listeners (only if not locked)
    if (!locked) {
      card.querySelector(`#pick-away-${game.id}`)?.addEventListener('click', () => handlePick(game, game.awayTeam.id, dateStr));
      card.querySelector(`#pick-home-${game.id}`)?.addEventListener('click', () => handlePick(game, game.homeTeam.id, dateStr));

      // Schedule lock at game start
      const msUntilLock = new Date(game.startTime) - new Date();
      if (msUntilLock > 0 && msUntilLock < 86400000) {
        lockTimers[game.id] = setTimeout(() => {
          const footer = document.getElementById(`footer-${game.id}`);
          if (footer) footer.innerHTML = buildFooter(game, true, false, userPicks[game.id]?.teamId || null, null);
          card.classList.add('locked');
        }, msUntilLock);
      }
    }

    return card;
  }

  function buildFooter(game, locked, isFinal, userPick, correct) {
    const awaySelected = String(userPick) === String(game.awayTeam.id);
    const homeSelected = String(userPick) === String(game.homeTeam.id);

    if (isFinal) {
      if (!userPick) {
        return `<span class="lock-msg">🔒 No pick made</span>`;
      }
      const teamName = userPick === game.homeTeam.id ? game.homeTeam.name : game.awayTeam.name;
      const isAuto   = userPicks[game.id]?.auto === true;
      const autoBadge = isAuto ? '<span class="auto-pick-badge">🤖 auto</span>' : '';
      if (correct) {
        return `<span class="result-indicator correct">✅ Correct — ${teamName}${autoBadge}</span>`;
      } else {
        const winnerName = game.winnerId === game.homeTeam.id ? game.homeTeam.name : game.awayTeam.name;
        return `<span class="result-indicator wrong">❌ Wrong — picked ${teamName}, winner was ${winnerName}${autoBadge}</span>`;
      }
    }

    if (locked) {
      if (!userPick) {
        return `<span class="lock-msg">🔒 Locked — no pick made</span>`;
      }
      const teamName = userPick === game.homeTeam.id ? game.homeTeam.name : game.awayTeam.name;
      const isAuto   = userPicks[game.id]?.auto === true;
      return `<span class="lock-msg">🔒 Locked in: <strong>${teamName}</strong>${isAuto ? '<span class="auto-pick-badge">🤖 auto</span>' : ''}</span>`;
    }

    // Open for picks
    return `
      <span class="pick-label">Pick the winner:</span>
      <div class="pick-controls">
        <button class="pick-btn ${awaySelected ? 'selected' : ''}" id="pick-away-${game.id}">
          <img src="${espnLogoUrl(game.awayTeam.abbrev.toLowerCase())}" alt="" onerror="this.style.display='none'" />
          ${game.awayTeam.abbrev}
        </button>
        <button class="pick-btn ${homeSelected ? 'selected' : ''}" id="pick-home-${game.id}">
          <img src="${espnLogoUrl(game.homeTeam.abbrev.toLowerCase())}" alt="" onerror="this.style.display='none'" />
          ${game.homeTeam.abbrev}
        </button>
      </div>
    `;
  }

  async function handlePick(game, teamId, dateStr) {
    if (gameIsLocked(game.startTime)) return;

    // Toggle off if same pick
    const existing = userPicks[game.id]?.teamId;
    const newTeamId = existing === teamId ? null : teamId;

    userPicks[game.id] = newTeamId ? { teamId: newTeamId, lockedIn: true } : {};

    // Update UI immediately
    const footer = document.getElementById(`footer-${game.id}`);
    if (footer) {
      footer.innerHTML = buildFooter(game, false, false, newTeamId, null);
      footer.querySelector(`#pick-away-${game.id}`)?.addEventListener('click', () => handlePick(game, game.awayTeam.id, dateStr));
      footer.querySelector(`#pick-home-${game.id}`)?.addEventListener('click', () => handlePick(game, game.homeTeam.id, dateStr));
    }

    // Save to Firebase
    if (newTeamId) {
      await savePick(dateStr, game.id, newTeamId);
    } else {
      // Remove pick
      const pickRef = ref(db, `picks/${currentUser.uid}/${dateStr}/${game.id}`);
      await set(pickRef, null).catch(() => {});
    }

    updateSummary(Object.values(gamesCache));
  }

  // ── Auth gate ─────────────────────────────────────────────────────────

  // ── Survivor helpers ──────────────────────────────────────────────────
  function espnLogoSurv(abbrev) {
    const a = abbrev.toUpperCase();
    const slug = a === 'ATH' ? 'oak' : a === 'CHW' ? 'cws' : abbrev.toLowerCase();
    return `https://a.espncdn.com/i/teamlogos/mlb/500/${slug}.png`;
  }

  function yearMonthStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function teamsPlayingToday(games) {
    const set = new Set();
    for (const g of games) {
      set.add(g.homeTeam.abbrev.toUpperCase());
      set.add(g.awayTeam.abbrev.toUpperCase());
    }
    return set;
  }

  function getSurvivorPickResult(state, games) {
    const today     = todayStr();
    const todayPick = state.usedTeams?.[today];
    if (!todayPick) return null;
    for (const g of games) {
      const homeAbbrev = normalizeAbbrev(g.homeTeam.abbrev);
      const awayAbbrev = normalizeAbbrev(g.awayTeam.abbrev);
      const pick       = normalizeAbbrev(todayPick);
      const inGame     = homeAbbrev === pick || awayAbbrev === pick;
      if (!inGame) continue;
      if (g.statusName === 'STATUS_FINAL') {
        if (!g.winnerId) return { abbrev: todayPick, result: 'pending' };
        const homeWon = String(g.winnerId) === String(g.homeTeam.id);
        const won     = homeWon ? normalizeAbbrev(g.homeTeam.abbrev) === pick : normalizeAbbrev(g.awayTeam.abbrev) === pick;
        return { abbrev: todayPick, result: won ? 'win' : 'loss' };
      }
      return { abbrev: todayPick, result: 'pending' };
    }
    return { abbrev: todayPick, result: 'pending' };
  }



  function normalizeAbbrev(a) {
    const abbrev = (a || '').toUpperCase();
    if (abbrev === 'CHW') return 'CWS';
    if (abbrev === 'KCR') return 'KC';
    if (abbrev === 'SDP') return 'SD';
    if (abbrev === 'SFG') return 'SF';
    if (abbrev === 'TBR') return 'TB';
    if (abbrev === 'WSN') return 'WSH';
    return abbrev;
  }

  // ── Compute survivor status ──────────────────────────────────────────
  // Free pass must be explicitly approved by admin — no auto-apply.
  function computeSurvivorStatus(usedTeams, freePassUsed, freePassDay, monthGames, startDay, today) {
    const now  = new Date();
    const ym   = today.substring(0, 7);
    const year = parseInt(ym.split('-')[0]);
    const mon  = parseInt(ym.split('-')[1]) - 1;
    const daysInMonth = new Date(year, mon + 1, 0).getDate();
    let alive = true, eliminatedDay = null, eliminatedReason = null;

    // Effective start: if user has picks, start from their first pick day
    // (handles post-reset joins). If no picks, start from survivorStartDay.
    // New users who joined late will be eliminated for missed days.
    const pickDays = Object.keys(usedTeams||{}).map(ds=>parseInt(ds.split('-')[2])).sort((a,b)=>a-b);
    const effectiveStart = pickDays.length > 0 ? Math.max(startDay, pickDays[0]) : startDay;

    for (let d = effectiveStart; d <= Math.min(daysInMonth, 30); d++) {
      const dateStr = `${ym}-${String(d).padStart(2,'0')}`;
      if (dateStr > today) break;
      const dayData = monthGames[dateStr];
      if (!dayData) continue;
      if (now < dayData.lastStartTime) continue;
      const pick = (usedTeams || {})[dateStr];
      if (!pick) {
        // Don't eliminate for today if the user has NO picks at all this month —
        // this handles a mid-day reset where the user hasn't had a chance to pick yet.
        if (dateStr === today && pickDays.length === 0) break;
        alive = false; eliminatedDay = d; eliminatedReason = 'missed'; break;
      }
      const normPick = normalizeAbbrev(pick);
      const game = dayData.games.find(g =>
        normalizeAbbrev(g.homeTeam?.abbrev) === normPick ||
        normalizeAbbrev(g.awayTeam?.abbrev) === normPick
      );
      if (!game || game.statusName !== 'STATUS_FINAL' || !game.winnerId) continue;
      const homeWon = String(game.winnerId) === String(game.homeTeam?.id);
      const won = homeWon
        ? normalizeAbbrev(game.homeTeam.abbrev) === normPick
        : normalizeAbbrev(game.awayTeam.abbrev) === normPick;
      if (!won) {
        const fpSaves = freePassUsed && freePassDay === d;
        if (!fpSaves) { alive = false; eliminatedDay = d; eliminatedReason = 'loss'; break; }
      }
    }
    return { alive, eliminatedDay, eliminatedReason };
  }


  async function loadSurvivorSection(games) {
    const section = document.getElementById('survivorSection');
    const day     = new Date().getDate();
    const ym      = yearMonthStr();
    const today   = todayStr();

    if (day === 31) { section.style.display = 'none'; return; }
    section.style.display = '';

    // Load fresh state
    const snap = await get(ref(db, `survivor/${ym}/${currentUser.uid}`));
    survivorState = snap.exists() ? snap.val() : {
      alive: true, freePassUsed: false, freePassRequested: false,
      freePassDay: null, usedTeams: {}
    };

    // Load settings for startDay — month-aware so a May reset doesn't affect June
    const settingsSnap = await get(ref(db, 'adminConfig/settings'));
    const settings = settingsSnap.exists() ? settingsSnap.val() : {};
    const storedStartDay = settings.survivorStartDay || 1;
    const storedStartMonth = settings.survivorStartMonth || '';
    const currentYM2 = yearMonthStr();
    const startDay = (storedStartMonth === currentYM2) ? storedStartDay : 1;


    // Build monthGames from today's games for compute
    const todayData = {
      lastStartTime: games.length ? new Date(games[games.length-1].startTime) : new Date(0),
      games,
    };
    const monthGamesForCompute = { [today]: todayData };

    // Load past month games too so compute works for past days
    try {
      const gSnap = await get(ref(db, 'games'));
      if (gSnap.exists()) {
        gSnap.forEach(dc => {
          if (!dc.key.startsWith(ym) || dc.key === today) return;
          const gs = Object.values(dc.val()).sort((a,b) => new Date(a.startTime)-new Date(b.startTime));
          if (!gs.length) return;
          monthGamesForCompute[dc.key] = {
            lastStartTime: new Date(gs[gs.length-1].startTime),
            games: gs,
          };
        });
      }
    } catch(e) {}

    monthGamesCache = monthGamesForCompute;  // save for FP window check in renderSurvivorCard
    const raw = survivorState;
    const computed = computeSurvivorStatus(
      raw.usedTeams, raw.freePassUsed, raw.freePassDay,
      monthGamesForCompute, startDay, today
    );
    survivorState = { ...raw, ...computed };

    renderSurvivorCard(games);
  }


  function renderSurvivorCard(games) {
    const card      = document.getElementById('survivorCard');
    const today     = todayStr();
    const state     = survivorState;
    const todayPick = state.usedTeams?.[today];
    const day       = new Date().getDate();

    // Determine pick result for today
    const pickResult = getSurvivorPickResult(state, games);

    // ── Determine exact status ────────────────────────────────────────
    // alive: computed (from computeSurvivorStatus via loadSurvivorSection)
    // lostToday: pick exists and game is final and they lost
    // fpRequested: requested but not yet approved
    // fpUsed: approved and used
    // canPick: alive AND (no pick yet, OR pick's game hasn't started) AND no pending loss
    const lostToday = pickResult?.result === 'loss';
    const fpUsed    = state.freePassUsed;
    const fpReq     = state.freePassRequested && !state.freePassUsed;

    // A user can pick if:
    // 1. They are alive (computed)
    // 2. They haven't lost today (or if they lost, their free pass was approved)
    // 3. Their current pick's game hasn't started yet (or they have no pick)
    const pickGame = todayPick ? games.find(g =>
      normalizeAbbrev(g.homeTeam.abbrev) === normalizeAbbrev(todayPick) ||
      normalizeAbbrev(g.awayTeam.abbrev) === normalizeAbbrev(todayPick)
    ) : null;
    const pickGameStarted = pickGame ? new Date() >= new Date(pickGame.startTime) : false;
    const anyGameStarted  = games.some(g => new Date() >= new Date(g.startTime));

    // Blocking conditions
    function fpWindowOpen() {
      if (!state.eliminatedDay) return false;
      const ym = today.substring(0, 7);
      const nextDay = state.eliminatedDay + 1;
      const nextDateStr = `${ym}-${String(nextDay).padStart(2, '0')}`;
      const nextDayData = monthGamesCache[nextDateStr];
      if (!nextDayData || !nextDayData.games?.length) return true;
      const allFinal = nextDayData.games.every(g => g.statusName === 'STATUS_FINAL');
      return !allFinal;
    }

    const lostWithFPAvailable = !state.alive && state.eliminatedReason === 'loss'
      && !fpUsed && !fpReq && fpWindowOpen();
    const blockedByLoss    = (lostToday || lostWithFPAvailable) && !fpUsed;
    const blockedByElim    = !state.alive && !lostWithFPAvailable;

    // allGamesStarted = last game has started (survivor picks lock at last game start)
    const lastGame = [...games].sort((a,b) => new Date(b.startTime)-new Date(a.startTime))[0];
    const allGamesStarted = lastGame ? new Date() >= new Date(lastGame.startTime) : false;

    const canPick = state.alive
      && !blockedByLoss
      && (() => {
        if (todayPick) return !pickGameStarted;  // can change if picked team's game not started
        return !allGamesStarted;                  // can pick until last game starts
      })();

    // ── Card header ───────────────────────────────────────────────────
    let cardClass = 's-alive', icon = '✅', title = 'Alive';
    let sub = `Day ${day}`;

    if (blockedByElim) {
      cardClass = 's-dead'; icon = '💀'; title = 'Eliminated';
      sub = state.eliminatedReason === 'missed' ? `Missed pick on day ${state.eliminatedDay}` : `Lost on day ${state.eliminatedDay}`;
    } else if (fpUsed) {
      cardClass = 's-freepass'; icon = '🎟️';
      title = 'Alive — Free Pass Used';
      sub = `Free pass used on day ${state.freePassDay}`;
    } else if (blockedByLoss) {
      cardClass = 's-dead'; icon = '❌';
      title = fpReq ? 'Loss — Free Pass Requested' : 'Loss — Request Free Pass';
      sub = fpReq
        ? `Day ${state.eliminatedDay || day} · awaiting admin approval`
        : `Lost on day ${state.eliminatedDay || day} · free pass available`;
    }

    card.className = `survivor-status-card ${cardClass}`;

    // ── Pick display ──────────────────────────────────────────────────
    let pickHTML = '';

    if (blockedByElim) {
      // Eliminated — show why, no grid
      pickHTML = `
        <div class="s-pick-row">
          <span style="font-size:13px;color:var(--ink-faint)">
            ${state.eliminatedReason === 'missed'
              ? '⚠️ You missed a pick and have been eliminated.'
              : fpUsed
                ? '⚠️ Your team lost. Your free pass was already used.'
                : '⚠️ Your team lost and you have no free pass remaining.'}
          </span>
        </div>`;

    } else if (blockedByLoss) {
      // Lost on today or a past day — show pick result and FP request button, no grid
      const showReqBtn = !fpReq;
      const losingPick = lostWithFPAvailable
        ? (state.usedTeams?.[`${today.substring(0,7)}-${String(state.eliminatedDay).padStart(2,'0')}`] || todayPick)
        : todayPick;
      pickHTML = `
        <div class="s-pick-row">
          <span class="s-pick-label">${lostWithFPAvailable ? `Day ${state.eliminatedDay} pick:` : "Today's pick:"}</span>
          ${losingPick ? `
          <div class="s-current-pick pick-loss">
            <img src="${espnLogoSurv(losingPick)}" alt="${losingPick}" onerror="this.style.display='none'" />
            ${normalizeAbbrev(losingPick)}
          </div>
          <span class="s-result-loss">❌ Team lost</span>` : ''}
        </div>
        ${showReqBtn ? `<button class="s-freepass-btn" id="requestFPBtn" style="margin-top:8px">🎟️ Request Free Pass</button>` : ''}
        ${fpReq ? `<div class="s-msg show info" style="margin-top:8px">⏳ Free pass requested — awaiting admin approval. You cannot pick until approved.</div>` : ''}`;

    } else if (todayPick) {
      // Has a pick, not blocked — show it with change option if game not started
      const chipClass = pickResult?.result === 'win' ? 'pick-win'
                      : pickResult?.result === 'loss' ? 'pick-loss'
                      : 'pick-pending';
      const resultLabel = pickResult?.result === 'win' ? '✅ Survived!'
        : pickGameStarted ? '⏳ Game in progress…'
        : '🔓 Pick saved — game not started yet';
      const resultClass = pickResult?.result === 'win' ? 's-result-win' : 's-result-pending';

      pickHTML = `
        <div class="s-pick-row">
          <span class="s-pick-label">Today's survivor pick:${canPick ? ' <span style="font-size:12px;color:var(--ink-faint);font-weight:400">(tap team below to change)</span>' : ''}</span>
          <div class="s-current-pick ${chipClass}">
            <img src="${espnLogoSurv(todayPick)}" alt="${todayPick}" onerror="this.style.display='none'" />
            ${normalizeAbbrev(todayPick)}
          </div>
          <span class="${resultClass}">${resultLabel}</span>
        </div>`;

    } else {
      // No pick yet — show prompt or warning
      if (anyGameStarted && !canPick) {
        pickHTML = `<div class="s-pick-row"><span style="font-size:13px;color:var(--red)">⚠️ All games have started — no pick made today.</span></div>`;
      } else {
        pickHTML = `<div class="s-pick-row"><span class="s-pick-label">Pick a team below to stay alive.</span></div>`;
      }
    }

    // ── Team grid (only when canPick) ─────────────────────────────────
    let gridHTML = '';
    if (canPick) {
      const usedSet = new Set(
        Object.entries(state.usedTeams || {})
          .filter(([date]) => date !== today) // exclude today so they can re-pick same team
          .map(([, abbrev]) => abbrev)
      );
      const allTeams = [
        'ARI','ATL','BAL','BOS','CHC','CWS','CIN','CLE','COL','DET',
        'HOU','KC','LAA','LAD','MIA','MIL','MIN','NYM','NYY','ATH',
        'PHI','PIT','SD','SF','SEA','STL','TB','TEX','TOR','WSH'
      ];
      gridHTML = `
        <div class="s-team-grid" id="sTeamGrid">
          ${allTeams.map(abbrev => {
            const used    = usedSet.has(abbrev);
            const playing = games.some(g =>
              normalizeAbbrev(g.homeTeam.abbrev) === abbrev ||
              normalizeAbbrev(g.awayTeam.abbrev) === abbrev
            );
            const started = games.some(g =>
              (normalizeAbbrev(g.homeTeam.abbrev) === abbrev ||
               normalizeAbbrev(g.awayTeam.abbrev) === abbrev) &&
              new Date() >= new Date(g.startTime)
            );
            const isCurrentPick = normalizeAbbrev(todayPick||'') === abbrev;
            const disabled = used || started;
            return `<button class="s-team-tile${used ? ' s-used' : ''}${started && !used ? ' s-started' : ''}${isCurrentPick ? ' s-selected' : ''}"
              data-abbrev="${abbrev}" ${disabled ? 'disabled' : ''}
              title="${used ? 'Already used this month' : started ? 'Game started' : !playing ? 'Not playing today' : abbrev}"
              style="${!playing && !disabled ? 'opacity:.4' : ''}">
              <img src="${espnLogoSurv(abbrev)}" onerror="this.style.display='none'" />
              <span>${abbrev}</span>
              ${used ? '<span class="s-tile-badge">✓</span>' : ''}
              ${started && !used ? '<span class="s-tile-badge">🔒</span>' : ''}
            </button>`;
          }).join('')}
        </div>
        <div id="sPickConfirmRow" style="display:none" class="s-confirm-row">
          <span id="sSelectedLabel" class="s-selected-label"></span>
          <button class="s-confirm-btn" id="sConfirmBtn">Confirm Pick</button>
          <button class="s-cancel-btn" onclick="document.getElementById('sPickConfirmRow').style.display='none';survivorSelected=null;document.querySelectorAll('.s-team-tile.s-selected').forEach(b=>{if(b.dataset.abbrev!=='${normalizeAbbrev(todayPick||'')}')b.classList.remove('s-selected')})">Cancel</button>
        </div>
        <div class="s-msg" id="sMsg"></div>`;
    }

    // ── FP note ───────────────────────────────────────────────────────
    const fpNote = fpUsed
      ? `<span class="s-fp-note">🎟️ Free pass used day ${state.freePassDay}</span>`
      : fpReq
        ? `<span class="s-fp-note" style="color:#7A5A10">⏳ Free pass pending</span>`
        : state.alive
          ? `<span class="s-fp-note" style="color:var(--green)">🎟️ Free pass available</span>`
          : '';

    card.innerHTML = `
      <div class="s-status-header">
        <div class="s-top-left">
          <span class="s-icon">${icon}</span>
          <div>
            <div class="s-title">${title}</div>
            <div class="s-sub">${sub}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${fpNote}
          <button onclick="loadSurvivorSection(window._lastSurvivorGames||[])" style="background:none;border:none;font-size:12px;color:var(--ink-faint);cursor:pointer;padding:4px">↻</button>
        </div>
      </div>
      ${pickHTML}
      ${gridHTML}
    `;

    // Wire FP request button
    document.getElementById('requestFPBtn')?.addEventListener('click', async () => {
      const btn = document.getElementById('requestFPBtn');
      btn.disabled = true; btn.textContent = 'Requesting…';
      const ym2 = yearMonthStr();
      const fpDay = state.eliminatedDay || day;
      try {
        await update(ref(db), {
          [`survivor/${ym2}/${currentUser.uid}/freePassRequested`]: true,
          [`survivor/${ym2}/${currentUser.uid}/freePassDay`]: fpDay,
        });
        survivorState.freePassRequested = true;
        survivorState.freePassDay = fpDay;
        renderSurvivorCard(games);
      } catch(e) {
        btn.disabled = false; btn.textContent = '🎟️ Request Free Pass';
      }
    });

    // Wire team grid clicks
    if (canPick) {
      document.querySelectorAll('.s-team-tile:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.s-team-tile').forEach(b => b.classList.remove('s-selected'));
          btn.classList.add('s-selected');
          survivorSelected = btn.dataset.abbrev;
          const confirmRow = document.getElementById('sPickConfirmRow');
          const label = document.getElementById('sSelectedLabel');
          if (confirmRow) confirmRow.style.display = 'flex';
          if (label) label.textContent = `Pick: ${survivorSelected}`;
        });
      });
      document.getElementById('sConfirmBtn')?.addEventListener('click', confirmSurvivorPick);
    }
  }


  async function confirmSurvivorPick() {
    if (!survivorSelected) return;
    const today = todayStr();
    const ym    = yearMonthStr();
    const btn   = document.getElementById('sConfirmBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const updatedTeams = { ...(survivorState.usedTeams || {}), [today]: survivorSelected };
      await update(ref(db), {
        [`survivor/${ym}/${currentUser.uid}/usedTeams`]:    updatedTeams,
        [`survivor/${ym}/${currentUser.uid}/alive`]:        survivorState.alive,
        [`survivor/${ym}/${currentUser.uid}/freePassUsed`]: survivorState.freePassUsed,
      });
      survivorState.usedTeams = updatedTeams;
      survivorSelected = null;
      renderSurvivorCard(Object.values(gamesCache));
    } catch (err) {
      const msg = document.getElementById('sMsg');
      if (msg) { msg.textContent = 'Failed to save. Try again.'; msg.className = 's-msg error show'; }
      btn.disabled = false; btn.textContent = 'Confirm Survivor Pick';
    }
  }



  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }

    currentUser = user;

    // Check approval
    const snap = await get(child(ref(db), `adminConfig/members/${user.uid}`));
    const member = snap.exists() ? snap.val() : null;
    const adminSnap = await get(child(ref(db), `adminConfig/admins/${user.uid}`));
    const isAdmin = adminSnap.exists() && adminSnap.val() === true;

    if (!member?.approved && !isAdmin) {
      window.location.href = 'index.html'; return;
    }

    // Nav
    // Init shared nav
    initNav({
      activePage: 'picks.html',
      isAdmin,
      userName: member?.displayName || user.email,
    });
    // admin link handled by nav.js
    const _signOut = () => signOut(auth).then(() => window.location.href = 'index.html');
    document.getElementById('signOutBtn')?.addEventListener('click', _signOut);
    document.getElementById('drawerSignOutBtn')?.addEventListener('click', _signOut);

    // Load today's games
    setDate(todayStr());

  });
</script>

</body>
</html>
