<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Picks · NFL Pick Em</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F7F5F0;
      --cream-dark:  #EDEAE2;
      --ink:         #1A1A1A;
      --ink-light:   #555550;
      --ink-faint:   #999990;
      --navy:        #1B3A5C;
      --red:         #C0392B;
      --green:       #27AE60;
      --accent:      #E8A838;
      --white:       #FFFFFF;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,.10);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.13);
      --radius:      12px;
      --radius-sm:   8px;
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }



















    /* ── Page body ───────────────────────────── */
    .page-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 82px 24px 48px;
    }

    /* ── Page header ─────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--navy);
      line-height: 1.1;
    }

    .page-header p {
      font-size: 14px;
      color: var(--ink-faint);
      margin-top: 4px;
    }

    /* ── Week selector ───────────────────────── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-btn {
      width: 34px; height: 34px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--ink-light);
      transition: border-color .15s, color .15s;
    }
    .date-btn:hover { border-color: var(--navy); color: var(--navy); }

    .date-display {
      padding: 7px 16px;
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      min-width: 100px;
      text-align: center;
    }

    /* ── MNF badge on game card ──────────────── */
    .mnf-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--white);
      background: var(--navy);
      padding: 2px 8px;
      border-radius: 100px;
      letter-spacing: .04em;
      margin-right: auto;
    }

    /* ── MNF Tiebreaker card ──────────────────── */
    .tiebreaker-card {
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .tiebreaker-title { font-size: 15px; font-weight: 700; color: var(--navy); }
    .tiebreaker-sub { font-size: 13px; color: var(--ink-light); margin-top: 2px; margin-bottom: 12px; }
    .tiebreaker-input-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tiebreaker-input-row input {
      width: 120px;
      padding: 8px 12px;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
    }
    .tiebreaker-input-row button {
      padding: 8px 16px;
      background: var(--navy);
      color: var(--white);
      border: 1.5px solid var(--navy);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .tiebreaker-locked { font-size: 14px; color: var(--ink); }
    .tiebreaker-msg { font-size: 13px; }
    .tiebreaker-msg.error { color: var(--red); }
    .tiebreaker-msg.success { color: var(--green); }

    /* ── Summary bar ─────────────────────────── */
    .summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--ink-light);
    }

    .summary-chip strong { color: var(--ink); }

    /* ── Game cards ──────────────────────────── */
    .games-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .game-card {
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }

    .game-card:hover { box-shadow: var(--shadow-md); }

    /* locked / final states */
    .game-card.locked  { border-color: #D4CAB8; }
    .game-card.correct { border-color: #A8D5B5; background: #F4FBF6; }
    .game-card.wrong   { border-color: #F0C4C0; background: #FDF5F4; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--cream-dark);
      background: var(--cream);
    }

    .game-time { font-size: 12px; font-weight: 600; color: var(--ink-light); text-transform: uppercase; letter-spacing: .04em; }

    .game-status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .badge-upcoming { background: #EEF2F8; color: var(--navy); }
    .badge-live     { background: #FDECEA; color: var(--red); }
    .badge-final    { background: var(--cream-dark); color: var(--ink-faint); }

    .card-body {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
    }

    /* Team side */
    .team-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .team-logo {
      width: 56px; height: 56px;
      object-fit: contain;
    }

    .team-logo-placeholder {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--cream-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .team-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }

    .team-record {
      font-size: 12px;
      color: var(--ink-faint);
    }

    .pitcher-stat {
      font-size: 11px;
      color: var(--ink-faint);
      font-weight: 400;
    }

    .team-pitcher {
      font-size: 11.5px;
      color: var(--ink-light);
      margin-top: 2px;
      line-height: 1.5;
    }

    /* Middle VS / score */
    .card-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .vs-text {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--ink-faint);
    }

    .score-display {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      letter-spacing: .04em;
    }

    .at-label {
      font-size: 11px;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* Pick section */
    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--cream-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pick-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-light);
      white-space: nowrap;
    }

    .pick-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .pick-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      background: var(--white);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .pick-btn img {
      width: 20px; height: 20px;
      object-fit: contain;
    }

    /* Hover only on devices that support it (not touch), skip already-selected */
    @media (hover: hover) {
      .pick-btn:hover:not(:disabled):not(.selected) {
        border-color: var(--navy);
        color: var(--navy);
        background: #EEF2F8;
      }
    }

    /* Active state works on all devices including touch */
    .pick-btn:active:not(:disabled):not(.selected) {
      border-color: var(--navy);
      color: var(--navy);
      background: #EEF2F8;
      transform: scale(.97);
    }

    .pick-btn.selected {
      border-color: var(--navy);
      background: var(--navy) !important;
      color: var(--white) !important;
    }

    .pick-btn.selected:active {
      background: #152e4a !important;
      transform: scale(.97);
    }

    .pick-btn:disabled {
      cursor: not-allowed;
      opacity: .6;
    }

    /* Result indicators */
    .result-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .result-indicator.correct { color: var(--green); }
    .result-indicator.wrong   { color: var(--red); }

    .lock-msg {
      font-size: 12px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── States ──────────────────────────────── */
    .state-box {
      text-align: center;
      padding: 64px 24px;
      color: var(--ink-faint);
    }

    .state-box .icon { font-size: 48px; margin-bottom: 16px; }
    .state-box h3    { font-size: 18px; color: var(--ink-light); margin-bottom: 8px; }
    .state-box p     { font-size: 14px; line-height: 1.5; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--cream-dark);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }


    /* Auto-pick indicator */
    .auto-pick-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--ink-faint);
      background: var(--cream-dark);
      border-radius: 100px;
      padding: 2px 8px;
      margin-left: 6px;
    }

    /* ── Mobile ──────────────────────────────── */
    @media (max-width: 600px) {
  
      .page-header { flex-direction: column; align-items: flex-start; }
      .card-body {
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
      }
      .team-logo { width: 44px; height: 44px; }
      .team-name { font-size: 13px; }
      .pick-btn  { padding: 7px 10px; font-size: 12px; }
    }

    /* ── Survivor section ────────────────────── */
    .survivor-section {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 2px solid var(--cream-dark);
    }

    .survivor-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .survivor-section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--navy);
    }

    .survivor-section-sub {
      font-size: 13px;
      color: var(--ink-faint);
      margin-top: 3px;
    }

    .survivor-status-card {
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
    }

    .survivor-status-card.s-alive  { border-color: #A8D5B5; background: linear-gradient(135deg,#F0FBF4 0%,var(--white) 50%); }
    .survivor-status-card.s-dead   { border-color: #F0C4C0; background: linear-gradient(135deg,#FDF0EF 0%,var(--white) 50%); }
    .survivor-status-card.s-freepass { border-color: #F5DFA0; background: linear-gradient(135deg,#FEF9EE 0%,var(--white) 50%); }

    .s-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .s-top-left { display: flex; align-items: center; gap: 14px; }
    .s-icon { font-size: 36px; line-height: 1; }

    .s-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
    }

    .s-sub {
      font-size: 12px;
      color: var(--ink-faint);
      margin-top: 2px;
    }

    .s-pick-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .s-pick-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-light);
    }

    .s-current-pick {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      transition: background .2s, border-color .2s;
    }

    .s-current-pick.pick-win {
      background: #EFF6F2;
      border-color: #A8D5B5;
      color: #1D6A3E;
    }

    .s-current-pick.pick-loss {
      background: #FDF0EF;
      border-color: #F0C4C0;
      color: var(--red);
    }

    .s-current-pick.pick-pending {
      background: var(--cream);
      border-color: var(--cream-dark);
    }

    .s-current-pick img { width: 26px; height: 26px; object-fit: contain; }

    .s-result-win     { color: var(--green); font-size: 13px; font-weight: 700; }
    .s-result-loss    { color: var(--red);   font-size: 13px; font-weight: 700; }
    .s-result-pending { color: var(--ink-faint); font-size: 13px; }

    .s-team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .s-team-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      background: var(--white);
      cursor: pointer;
      transition: all .15s;
      position: relative;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
    }

    .s-team-tile img { width: 30px; height: 30px; object-fit: contain; }

    .s-team-tile:hover:not(.s-used):not(.s-selected) {
      border-color: var(--navy);
      box-shadow: var(--shadow-sm);
    }

    .s-team-tile.s-selected {
      border-color: var(--navy);
      background: var(--navy);
      color: var(--white);
    }

    .s-team-tile.s-used {
      opacity: .38;
      cursor: not-allowed;
      background: var(--cream);
    }

    .s-used-dot {
      position: absolute;
      top: 3px; right: 3px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--ink-faint);
    }

    .s-confirm-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .s-selected-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      flex: 1;
    }

    .s-confirm-btn {
      padding: 9px 20px;
      background: var(--navy);
      color: var(--white);
      border: 1.5px solid var(--navy);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    @media (hover: hover) { .s-confirm-btn:hover { background: #152e4a; border-color: #152e4a; } }
    .s-confirm-btn:active { background: #152e4a; }
    .s-confirm-btn:disabled { opacity: .5; cursor: not-allowed; }

    .s-cancel-btn {
      padding: 9px 20px;
      background: transparent;
      color: var(--ink-light);
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    @media (hover: hover) { .s-cancel-btn:hover { border-color: var(--red); color: var(--red); } }
    .s-cancel-btn:active { border-color: var(--red); color: var(--red); }

    .s-freepass-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--accent);
      border-radius: var(--radius-sm);
      background: #FEF9EE;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #7A5A10;
      cursor: pointer;
      transition: all .15s;
    }
    .s-freepass-btn:hover { background: var(--accent); color: var(--white); }
    .s-freepass-btn:disabled { opacity: .5; cursor: not-allowed; }

    .s-msg {
      margin-top: 10px;
      padding: 9px 13px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: none;
    }
    .s-msg.show  { display: block; }
    .s-msg.error { background: #FDF0EF; color: var(--red); border: 1px solid #F5C6C2; }
    .s-msg.info  { background: #EFF6F2; color: #1D6A3E; border: 1px solid #B8DFCA; }

    .view-survivor-link {
      font-size: 13px;
      color: var(--navy);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .view-survivor-link:hover { text-decoration: underline; }


  /* ── Nav base ─────────────────────────────── */
  #mainNav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--white);
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    z-index: 200;
    height: 58px;
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    gap: 2px;
    flex: 1;
    justify-content: center;
  }

  .nav-link {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-light);
    text-decoration: none;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }

  .nav-link:hover  { background: var(--cream); color: var(--ink); }
  .nav-link.active { background: var(--navy); color: var(--white); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .nav-user {
    font-size: 13px;
    color: var(--ink-faint);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-signout {
    padding: 6px 12px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 6px;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }

  .btn-signout:hover { border-color: var(--red); color: var(--red); }

  /* ── Hamburger ────────────────────────────── */
  .hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: transparent;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }

  .hamburger span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--ink);
    border-radius: 2px;
    transition: all .2s ease;
  }

  .hamburger[aria-expanded="true"] span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }

<!-- Firebase + App logic -->
<script type="module">

function initNav({ activePage, isAdmin = false, userName = '' }) {

<a href="index.html" class="nav-logo">🏈 NFL Pick Em</a>

      </div>
      ${userName ? `<div class="drawer-user">${userName}</div>` : ''}
      <nav class="drawer-nav">
        ${pages.map(p => `
          <a href="${p.href}" class="drawer-link${p.href === activePage ? ' active' : ''}" ${p.href === 'admin.html' ? 'id="drawerAdminLink"' : ''}>

    </div>
    <div class="drawer-overlay" id="drawerOverlay"></div>
  `;

  // Wire hamburger
  const hamburger = document.getElementById('hamburgerBtn');

  const closeBtn  = document.getElementById('drawerClose');

  function openDrawer() {

  function closeDrawer() {

  hamburger?.addEventListener('click', openDrawer);
  closeBtn?.addEventListener('click', closeDrawer);
  overlay?.addEventListener('click', closeDrawer);
  drawer?.querySelectorAll('.drawer-link').forEach(l => l.addEventListener('click', closeDrawer));
}

  // ── Check pending free pass requests and badge Admin nav ─────────────
  async function checkPendingFPRequests() {
    try {
      const season = seasonKey();
      const snap = await get(ref(db, `survivor/${season}`));
      if (!snap.exists()) return;
      let count = 0;
      snap.forEach(child => {
        const s = child.val();
        if (s.freePassRequested && !s.freePassUsed) count++;
      });
      ['adminLink', 'drawerAdminLink'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.querySelectorAll('.nav-badge,.drawer-badge').forEach(b => b.remove());
        if (count > 0) {
          const isDrawer = id === 'drawerAdminLink';
          const badge = document.createElement('span');
          badge.className = isDrawer ? 'drawer-badge' : 'nav-badge';
          badge.textContent = count;
          el.appendChild(badge);
        }
      });
    } catch(e) { /* silent */ }
  }

  const firebaseConfig = {
    apiKey: "AIzaSyAWAPwR2Qa4uVYatrSN82gKPwUakVd_yoM",
    authDomain: "nflpickem1728.firebaseapp.com",
    databaseURL: "https://nflpickem1728-default-rtdb.firebaseio.com",
    projectId: "nflpickem1728",
    storageBucket: "nflpickem1728.firebasestorage.app",
    messagingSenderId: "752271833942",
    appId: "1:752271833942:web:3cd773d3e2c8856dedb4f7"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  // ── State ─────────────────────────────────────────────────────────────
  let currentUser     = null;
  let currentWeek      = 1;
  let seasonStartDate  = null;
  let userPicks        = {};               // gameId → {teamId, lockedIn}
  let gamesCache        = {};               // gameId → game object
  let lockTimers        = {};               // gameId → setTimeout id
  let pollInterval      = null;

  // ── Survivor state ────────────────────────────────────────────────────
  const NFL_TEAMS = [
    'ARI','ATL','BAL','BUF','CAR','CHI','CIN','CLE','DAL','DEN',
    'DET','GB','HOU','IND','JAX','KC','LAC','LAR','LV','MIA',
    'MIN','NE','NO','NYG','NYJ','PHI','PIT','SEA','SF','TB','TEN','WSH'
  ];

  let survivorState    = null;
  let survivorSelected = null;
  let weekGamesCache   = {};   // 'week-N' → { lastStartTime, games }

  // ── Winner resolution ────────────────────────────────────────────────
  function didPickWin(userPick, game) {
    if (!userPick || !game.winnerId) return false;
    return String(userPick) === String(game.winnerId);
  }

  function pickAbbrev(userPick, game) {
    return String(userPick) === String(game.homeTeam.id)
      ? game.homeTeam.abbrev : game.awayTeam.abbrev;
  }

  // ── Season / week helpers ────────────────────────────────────────────
  function seasonKey() {
    return seasonStartDate ? seasonStartDate.slice(0,4) : String(new Date().getFullYear());
  }

  function getCurrentWeek() {
    if (!seasonStartDate) return 1;
    const start = new Date(seasonStartDate + 'T00:00:00');
    const diff  = Math.floor((new Date() - start) / 86400000);
    return Math.max(1, Math.min(18, Math.floor(diff / 7) + 1));
  }

  function normalizeAbbrev(a) {
    const m = { 'WAS':'WSH', 'JAC':'JAX', 'KAN':'KC', 'NEP':'NE', 'NOS':'NO', 'GNB':'GB', 'SFO':'SF', 'TAM':'TB' };
    const up = (a || '').toUpperCase();
    return m[up] || up || '??';
  }

  // ── ESPN helpers ──────────────────────────────────────────────────────
  function espnLogoUrl(abbrev) {
    return `https://a.espncdn.com/i/teamlogos/nfl/500/${(abbrev||'').toLowerCase()}.png`;
  }

  function gameIsLocked(startTimeISO) {
    return new Date() >= new Date(startTimeISO);
  }

  function formatGameDay(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { weekday: 'short', timeZone: 'America/New_York' });
  }

  function formatGameTime(iso) {
    return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short' });
  }

  function findMNFGame(games) {
    const mon = games.filter(g => formatGameDay(g.startTime) === 'Mon');
    if (!mon.length) return null;
    return mon.reduce((a,b) => new Date(a.startTime) > new Date(b.startTime) ? a : b);
  }

  // ── Parse ESPN scoreboard ─────────────────────────────────────────────
  function parseESPN(data) {
    const games = [];
    const events = data?.events || [];

    for (const event of events) {
      const comp      = event.competitions?.[0];
      if (!comp) continue;

      const competitors = comp.competitors || [];
      const home = competitors.find(c => c.homeAway === 'home');
      const away = competitors.find(c => c.homeAway === 'away');
      if (!home || !away) continue;

      const status     = event.status?.type;
      const statusName = status?.name || 'STATUS_SCHEDULED';
      const startTime  = comp.date || event.date;

      const homeScore = home.score ?? null;
      const awayScore = away.score ?? null;

      let winnerId = null;
      if (statusName === 'STATUS_FINAL') {
        if (home.winner) winnerId = String(home.team.id);
        else if (away.winner) winnerId = String(away.team.id);
        else if (home.score != null && away.score != null)
          winnerId = parseInt(home.score) > parseInt(away.score) ? String(home.team.id) : String(away.team.id);
      }

      games.push({
        id:          event.id,
        startTime,
        statusName,
        statusShort: status?.shortDetail || '',
        homeTeam:    { id: String(home.team.id), abbrev: normalizeAbbrev(home.team.abbreviation), name: home.team.displayName, record: home.records?.[0]?.summary || '' },
        awayTeam:    { id: String(away.team.id), abbrev: normalizeAbbrev(away.team.abbreviation), name: away.team.displayName, record: away.records?.[0]?.summary || '' },
        homeScore,
        awayScore,
        winnerId,
      });
    }
    return games;
  }

  // ── Load games ────────────────────────────────────────────────────────
  async function fetchGamesFromESPN(week) {
    const year = seasonKey();
    const res  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?dates=${year}&seasontype=2&week=${week}`);
    const data = await res.json();
    const games = parseESPN(data).sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
    if (games.length > 0) {
      const cacheObj = {};
      for (const g of games) cacheObj[g.id] = g;
      await set(ref(db, `games/week-${week}`), cacheObj).catch(() => {});
    }
    return games;
  }

  async function loadGames(week) {
    const container  = document.getElementById('gamesContainer');
    const summaryBar = document.getElementById('summaryBar');
    summaryBar.style.display = 'none';
    container.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Loading games…</p></div>`;

    Object.values(lockTimers).forEach(clearTimeout);
    lockTimers = {};
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

    let games = [];

    try {
      try {
        games = await fetchGamesFromESPN(week);
      } catch (espnErr) {
        console.warn('ESPN fetch failed, trying Firebase cache:', espnErr);
      }
      if (!games.length) {
        const dbSnap = await get(ref(db, `games/week-${week}`));
        if (dbSnap.exists()) {
          games = Object.entries(dbSnap.val())
            .filter(([k]) => k !== '_cachedAt')
            .map(([,v]) => v)
            .sort((a,b) => new Date(a.startTime) - new Date(b.startTime));
        }
      }
    } catch (err) {
      console.error('Failed to load games:', err.message, err);
      container.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><h3>Could not load games</h3><p>${err.message || 'Check your connection and try again.'}</p></div>`;
      return;
    }

    gamesCache = {};
    for (const g of games) gamesCache[g.id] = g;

    if (games.length === 0) {
      container.innerHTML = `<div class="state-box"><div class="icon">🏟️</div><h3>No games scheduled</h3><p>Check back once the schedule is posted for this week.</p></div>`;
      document.getElementById('tiebreakerSection').style.display = 'none';
      document.getElementById('survivorSection').style.display = 'none';
      return;
    }

    await loadUserPicks(week);

    renderGames(games, week);
    updateSummary(games);
    renderTiebreaker(games, week);
    loadSurvivorSection(games, week);

    const hasActive = games.some(g => g.statusName !== 'STATUS_FINAL');
    if (hasActive) {
      pollInterval = setInterval(async () => {
        try {
          const fresh = await fetchGamesFromESPN(week);
          if (!fresh.length) return;
          for (const g of fresh) gamesCache[g.id] = g;
          await loadUserPicks(week);
          renderGames(fresh, week);
          updateSummary(fresh);
          renderTiebreaker(fresh, week);
          loadSurvivorSection(fresh, week);
          if (fresh.every(g => g.statusName === 'STATUS_FINAL')) {
            clearInterval(pollInterval);
            pollInterval = null;
          }
        } catch (e) { console.warn('Poll failed:', e); }
      }, 3 * 60 * 1000);
    }
  }

  // ── Load picks ────────────────────────────────────────────────────────
  async function loadUserPicks(week) {
    if (!currentUser) return;
    const snap = await get(ref(db, `picks/${currentUser.uid}/week-${week}`));
    userPicks = snap.exists() ? snap.val() : {};
  }

  // ── Save pick ─────────────────────────────────────────────────────────
  async function savePick(week, gameId, teamId) {
    if (!currentUser) return;
    const pickRef = ref(db, `picks/${currentUser.uid}/week-${week}/${gameId}`);
    await set(pickRef, { teamId, lockedIn: true, correct: null });
    if (!userPicks[gameId]) userPicks[gameId] = {};
    userPicks[gameId].teamId = teamId;
    userPicks[gameId].lockedIn = true;
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function renderGames(games, week) {
    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    const grid = document.createElement('div');
    grid.className = 'games-grid';

    const mnfGame = findMNFGame(games);

    for (const game of games) {
      grid.appendChild(buildCard(game, week, mnfGame && game.id === mnfGame.id));
    }

    container.appendChild(grid);
  }

  function buildCard(game, week, isMNF) {
    const locked   = gameIsLocked(game.startTime);
    const isFinal  = game.statusName === 'STATUS_FINAL';
    const isLive   = game.statusName === 'STATUS_IN_PROGRESS';
    const userPick = userPicks[game.id]?.teamId || null;

    let resultClass = '';
    let correct = null;
    if (isFinal && game.winnerId && userPick) {
      correct = didPickWin(userPick, game);
      resultClass = correct ? 'correct' : 'wrong';
    }

    const card = document.createElement('div');
    card.className = `game-card ${locked ? 'locked' : ''} ${resultClass}`;
    card.dataset.gameId = game.id;

    let badgeClass = 'badge-upcoming';
    let badgeText  = `${formatGameDay(game.startTime)} ${formatGameTime(game.startTime)}`;
    if (isFinal) { badgeClass = 'badge-final'; badgeText = 'Final'; }
    else if (isLive) { badgeClass = 'badge-live'; badgeText = game.statusShort || 'Live'; }

    const midContent = (isFinal || isLive)
      ? `<div class="score-display">${game.awayScore ?? '–'} – ${game.homeScore ?? '–'}</div>`
      : `<div class="vs-text">@</div>`;

    const logoHtml = (team) => `
      <img class="team-logo"
           src="${espnLogoUrl(team.abbrev)}"
           alt="${team.name}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div class="team-logo-placeholder" style="display:none">🏈</div>`;

    card.innerHTML = `
      <div class="card-header">
        ${isMNF ? '<span class="mnf-badge">MNF</span>' : ''}
        <span class="game-time">${badgeText}</span>
        <span class="game-status-badge ${badgeClass}">${isFinal ? 'Final' : isLive ? '🔴 Live' : 'Upcoming'}</span>
      </div>

      <div class="card-body">
        <div class="team-side">
          ${logoHtml(game.awayTeam)}
          <div class="team-name">${game.awayTeam.name}</div>
          <div class="team-record">${game.awayTeam.record}</div>
        </div>

        <div class="card-mid">
          ${midContent}
          <div class="at-label">@ ${game.homeTeam.abbrev}</div>
        </div>

        <div class="team-side">
          ${logoHtml(game.homeTeam)}
          <div class="team-name">${game.homeTeam.name}</div>
          <div class="team-record">${game.homeTeam.record}</div>
        </div>
      </div>

      <div class="card-footer" id="footer-${game.id}">
        ${buildFooter(game, locked, isFinal, userPick, correct)}
      </div>
    `;

    if (!locked) {
      card.querySelector(`#pick-away-${game.id}`)?.addEventListener('click', () => handlePick(game, game.awayTeam.id, week));
      card.querySelector(`#pick-home-${game.id}`)?.addEventListener('click', () => handlePick(game, game.homeTeam.id, week));

      const msUntilLock = new Date(game.startTime) - new Date();
      if (msUntilLock > 0 && msUntilLock < 86400000 * 7) {
        lockTimers[game.id] = setTimeout(() => {
          const footer = document.getElementById(`footer-${game.id}`);
          if (footer) footer.innerHTML = buildFooter(game, true, false, userPicks[game.id]?.teamId || null, null);
          card.classList.add('locked');
        }, msUntilLock);
      }
    }

    return card;
  }

  function buildFooter(game, locked, isFinal, userPick, correct) {
    const awaySelected = String(userPick) === String(game.awayTeam.id);
    const homeSelected = String(userPick) === String(game.homeTeam.id);

    if (isFinal) {
      if (!userPick) {
        return `<span class="lock-msg">🔒 No pick made</span>`;
      }
      const teamName = String(userPick) === String(game.homeTeam.id) ? game.homeTeam.name : game.awayTeam.name;
      const isAuto   = userPicks[game.id]?.auto === true;
      const autoBadge = isAuto ? '<span class="auto-pick-badge">🤖 auto</span>' : '';
      if (correct) {
        return `<span class="result-indicator correct">✅ Correct — ${teamName}${autoBadge}</span>`;
      } else {
        const winnerName = String(game.winnerId) === String(game.homeTeam.id) ? game.homeTeam.name : game.awayTeam.name;
        return `<span class="result-indicator wrong">❌ Wrong — picked ${teamName}, winner was ${winnerName}${autoBadge}</span>`;
      }
    }

    if (locked) {
      if (!userPick) {
        return `<span class="lock-msg">🔒 Locked — no pick made</span>`;
      }
      const teamName = String(userPick) === String(game.homeTeam.id) ? game.homeTeam.name : game.awayTeam.name;
      const isAuto   = userPicks[game.id]?.auto === true;
      return `<span class="lock-msg">🔒 Locked in: <strong>${teamName}</strong>${isAuto ? '<span class="auto-pick-badge">🤖 auto</span>' : ''}</span>`;
    }

    return `
      <span class="pick-label">Pick the winner:</span>
      <div class="pick-controls">
        <button class="pick-btn ${awaySelected ? 'selected' : ''}" id="pick-away-${game.id}">
          <img src="${espnLogoUrl(game.awayTeam.abbrev)}" alt="" onerror="this.style.display='none'" />
          ${game.awayTeam.abbrev}
        </button>
        <button class="pick-btn ${homeSelected ? 'selected' : ''}" id="pick-home-${game.id}">
          <img src="${espnLogoUrl(game.homeTeam.abbrev)}" alt="" onerror="this.style.display='none'" />
          ${game.homeTeam.abbrev}
        </button>
      </div>
    `;
  }

  async function handlePick(game, teamId, week) {
    if (gameIsLocked(game.startTime)) return;

    const existing = userPicks[game.id]?.teamId;
    const newTeamId = String(existing) === String(teamId) ? null : teamId;

    userPicks[game.id] = newTeamId ? { teamId: newTeamId, lockedIn: true } : {};

    const footer = document.getElementById(`footer-${game.id}`);
    if (footer) {
      footer.innerHTML = buildFooter(game, false, false, newTeamId, null);
      footer.querySelector(`#pick-away-${game.id}`)?.addEventListener('click', () => handlePick(game, game.awayTeam.id, week));
      footer.querySelector(`#pick-home-${game.id}`)?.addEventListener('click', () => handlePick(game, game.homeTeam.id, week));
    }

    if (newTeamId) {
      await savePick(week, game.id, newTeamId);
    } else {
      const pickRef = ref(db, `picks/${currentUser.uid}/week-${week}/${game.id}`);
      await set(pickRef, null).catch(() => {});
    }

    updateSummary(Object.values(gamesCache));
  }

  // ── Summary bar ────────────────────────────────────────────────────────
  function updateSummary(games) {
    const bar = document.getElementById('summaryBar');
    bar.style.display = 'flex';

    const total   = games.length;
    const picked  = games.filter(g => userPicks[g.id]?.teamId).length;
    const finals  = games.filter(g => g.statusName === 'STATUS_FINAL' && userPicks[g.id]?.teamId);
    const correct = finals.filter(g => String(userPicks[g.id]?.teamId) === String(g.winnerId)).length;

    document.getElementById('sumGames').textContent  = total;
    document.getElementById('sumPicked').textContent = picked;

    const correctChip = document.getElementById('sumCorrectChip');
    if (finals.length > 0) {
      correctChip.style.display = '';
      document.getElementById('sumCorrect').textContent = `${correct} / ${finals.length}`;
    } else {
      correctChip.style.display = 'none';
    }
  }

  // ── MNF Tiebreaker ────────────────────────────────────────────────────
  async function renderTiebreaker(games, week) {
    const section = document.getElementById('tiebreakerSection');
    const mnfGame = findMNFGame(games);

    if (!mnfGame) { section.style.display = 'none'; return; }
    section.style.display = '';

    const locked = gameIsLocked(mnfGame.startTime);
    const snap   = await get(ref(db, `tiebreakers/${currentUser.uid}/week-${week}`));
    const guess  = snap.exists() ? snap.val() : null;

    const actual = mnfGame.statusName === 'STATUS_FINAL'
      ? (parseInt(mnfGame.awayScore||0) + parseInt(mnfGame.homeScore||0)) : null;

    section.innerHTML = `
      <div class="tiebreaker-card">
        <div class="tiebreaker-title">🏈 MNF Tiebreaker</div>
        <div class="tiebreaker-sub">${mnfGame.awayTeam.abbrev} @ ${mnfGame.homeTeam.abbrev} — guess the total combined score.</div>
        ${locked
          ? `<div class="tiebreaker-locked">🔒 Your guess: <strong>${guess != null ? guess : 'none submitted'}</strong>${actual != null ? ` · actual: <strong>${actual}</strong>` : ''}</div>`
          : `<div class="tiebreaker-input-row">
               <input type="number" step="0.1" id="tiebreakerInput" placeholder="Total points" value="${guess != null ? guess : ''}" />
               <button id="tiebreakerSaveBtn">Save Guess</button>
               <span id="tiebreakerMsg" class="tiebreaker-msg"></span>
             </div>`
        }
      </div>`;

    document.getElementById('tiebreakerSaveBtn')?.addEventListener('click', async () => {
      const input = document.getElementById('tiebreakerInput');
      const val   = parseFloat(input.value);
      const msg   = document.getElementById('tiebreakerMsg');
      if (isNaN(val)) { msg.textContent = 'Enter a number.'; msg.className = 'tiebreaker-msg error'; return; }
      try {
        await set(ref(db, `tiebreakers/${currentUser.uid}/week-${week}`), val);
        msg.textContent = '✅ Saved';
        msg.className = 'tiebreaker-msg success';
      } catch (e) {
        msg.textContent = 'Failed to save.';
        msg.className = 'tiebreaker-msg error';
      }
    });
  }

  // ── Week nav ──────────────────────────────────────────────────────────
  function setWeek(week) {
    week = Math.max(1, Math.min(18, week));
    currentWeek = week;
    document.getElementById('weekDisplay').textContent = `Week ${week}`;
    loadGames(week);
  }

  document.getElementById('prevWeek').addEventListener('click', () => { if (currentWeek > 1) setWeek(currentWeek - 1); });
  document.getElementById('nextWeek').addEventListener('click', () => { if (currentWeek < 18) setWeek(currentWeek + 1); });

  // ── Survivor helpers ──────────────────────────────────────────────────
  function teamsPlayingIn(games) {
    const s = new Set();
    for (const g of games) { s.add(normalizeAbbrev(g.homeTeam.abbrev)); s.add(normalizeAbbrev(g.awayTeam.abbrev)); }
    return s;
  }

  function getSurvivorPickResult(state, games, week) {
    const wk   = `week-${week}`;
    const pick = state.usedTeams?.[wk];
    if (!pick) return null;
    const normPick = normalizeAbbrev(pick);
    for (const g of games) {
      const homeAbbrev = normalizeAbbrev(g.homeTeam.abbrev);
      const awayAbbrev = normalizeAbbrev(g.awayTeam.abbrev);
      if (homeAbbrev !== normPick && awayAbbrev !== normPick) continue;
      if (g.statusName === 'STATUS_FINAL') {
        if (!g.winnerId) return { abbrev: pick, result: 'pending' };
        const won = String(g.winnerId) === String(homeAbbrev === normPick ? g.homeTeam.id : g.awayTeam.id);
        return { abbrev: pick, result: won ? 'win' : 'loss' };
      }
      return { abbrev: pick, result: 'pending' };
    }
    return { abbrev: pick, result: 'pending' };
  }

  // ── Compute survivor status across weeks ───────────────────────────────
  // Free pass must be explicitly approved by admin — no auto-apply.
  function computeSurvivorStatus(usedTeams, freePassUsed, freePassWeek, weekGames, startWeek, upToWeek) {
    let alive = true, eliminatedWeek = null, eliminatedReason = null;

    const pickWeeks = Object.keys(usedTeams||{}).map(k => parseInt(k.split('-')[1])).sort((a,b)=>a-b);
    const effectiveStart = pickWeeks.length > 0 ? Math.max(startWeek, pickWeeks[0]) : startWeek;

    for (let w = effectiveStart; w <= upToWeek; w++) {
      const wk = `week-${w}`;
      const wkData = weekGames[wk];
      if (!wkData) continue;
      if (new Date() < wkData.lastStartTime) continue;
      const pick = (usedTeams || {})[wk];
      if (!pick) {
        if (w === upToWeek && pickWeeks.length === 0) break;
        alive = false; eliminatedWeek = w; eliminatedReason = 'missed'; break;
      }
      const normPick = normalizeAbbrev(pick);
      const game = wkData.games.find(g =>
        normalizeAbbrev(g.homeTeam?.abbrev) === normPick ||
        normalizeAbbrev(g.awayTeam?.abbrev) === normPick
      );
      if (!game || game.statusName !== 'STATUS_FINAL' || !game.winnerId) continue;
      const homeWon = String(game.winnerId) === String(game.homeTeam?.id);
      const won = homeWon
        ? normalizeAbbrev(game.homeTeam.abbrev) === normPick
        : normalizeAbbrev(game.awayTeam.abbrev) === normPick;
      if (!won) {
        const fpSaves = freePassUsed && Number(freePassWeek) === w;
        if (!fpSaves) { alive = false; eliminatedWeek = w; eliminatedReason = 'loss'; break; }
      }
    }
    return { alive, eliminatedWeek, eliminatedReason };
  }

  async function loadWeekGames(week) {
    const wk = `week-${week}`;
    if (weekGamesCache[wk] && weekGamesCache[wk].allFinal) return weekGamesCache[wk];
    const dbSnap = await get(ref(db, `games/${wk}`));
    let games = dbSnap.exists()
      ? Object.entries(dbSnap.val()).filter(([k])=>k!=='_cachedAt').map(([,v])=>v).sort((a,b)=>new Date(a.startTime)-new Date(b.startTime))
      : [];
    if (!games.length) {
      try { games = await fetchGamesFromESPN(week); } catch(e) {}
    }
    if (games.length) {
      weekGamesCache[wk] = {
        lastStartTime: new Date(games[games.length-1].startTime),
        games,
        allFinal: games.every(g => g.statusName === 'STATUS_FINAL'),
      };
    }
    return weekGamesCache[wk];
  }

  async function loadSurvivorSection(games, week) {
    const section = document.getElementById('survivorSection');
    section.style.display = '';

    const season = seasonKey();
    const snap = await get(ref(db, `survivor/${season}/${currentUser.uid}`));
    survivorState = snap.exists() ? snap.val() : {
      alive: true, freePassUsed: false, freePassRequested: false,
      freePassWeek: null, usedTeams: {}
    };

    const settingsSnap = await get(ref(db, 'adminConfig/settings'));
    const settings = settingsSnap.exists() ? settingsSnap.val() : {};
    const startWeek = settings.survivorStartWeek || 1;

    weekGamesCache[`week-${week}`] = {
      lastStartTime: games.length ? new Date(games[games.length-1].startTime) : new Date(0),
      games,
      allFinal: games.every(g => g.statusName === 'STATUS_FINAL'),
    };

    for (let w = startWeek; w <= week; w++) {
      if (w === week) continue;
      await loadWeekGames(w);
    }

    const raw = survivorState;
    const computed = computeSurvivorStatus(
      raw.usedTeams, raw.freePassUsed, raw.freePassWeek,
      weekGamesCache, startWeek, week
    );
    survivorState = { ...raw, ...computed };

    renderSurvivorCard(games, week);
  }

  function renderSurvivorCard(games, week) {
    const card  = document.getElementById('survivorCard');
    const state = survivorState;
    const wk    = `week-${week}`;
    const weekPick = state.usedTeams?.[wk];

    const pickResult = getSurvivorPickResult(state, games, week);

    const lostThisWeek = pickResult?.result === 'loss';
    const fpUsed = state.freePassUsed;
    const fpReq  = state.freePassRequested && !state.freePassUsed;

    const pickGame = weekPick ? games.find(g =>
      normalizeAbbrev(g.homeTeam.abbrev) === normalizeAbbrev(weekPick) ||
      normalizeAbbrev(g.awayTeam.abbrev) === normalizeAbbrev(weekPick)
    ) : null;
    const pickGameStarted = pickGame ? new Date() >= new Date(pickGame.startTime) : false;
    const anyGameStarted  = games.some(g => new Date() >= new Date(g.startTime));

    function fpWindowOpen() {
      if (!state.eliminatedWeek) return false;
      const nextWeek = state.eliminatedWeek + 1;
      const nextData = weekGamesCache[`week-${nextWeek}`];
      if (!nextData || !nextData.games?.length) return true;
      return !nextData.allFinal;
    }

    const lostWithFPAvailable = !state.alive && state.eliminatedReason === 'loss'
      && !fpUsed && !fpReq && fpWindowOpen();
    const blockedByLoss = (lostThisWeek || lostWithFPAvailable) && !fpUsed;
    const blockedByElim = !state.alive && !lostWithFPAvailable;

    const lastGame = [...games].sort((a,b) => new Date(b.startTime)-new Date(a.startTime))[0];
    const allGamesStarted = lastGame ? new Date() >= new Date(lastGame.startTime) : false;

    const canPick = state.alive
      && !blockedByLoss
      && (() => {
        if (weekPick) return !pickGameStarted;
        return !allGamesStarted;
      })();

    let cardClass = 's-alive', icon = '✅', title = 'Alive';
    let sub = `Week ${week}`;

    if (blockedByElim) {
      cardClass = 's-dead'; icon = '💀'; title = 'Eliminated';
      sub = state.eliminatedReason === 'missed' ? `Missed pick in week ${state.eliminatedWeek}` : `Lost in week ${state.eliminatedWeek}`;
    } else if (fpUsed) {
      cardClass = 's-freepass'; icon = '🎟️';
      title = 'Alive — Free Pass Used';
      sub = `Free pass used week ${state.freePassWeek}`;
    } else if (blockedByLoss) {
      cardClass = 's-dead'; icon = '❌';
      title = fpReq ? 'Loss — Free Pass Requested' : 'Loss — Request Free Pass';
      sub = fpReq
        ? `Week ${state.eliminatedWeek || week} · awaiting admin approval`
        : `Lost week ${state.eliminatedWeek || week} · free pass available`;
    }

    let pickHTML = '';
    if (weekPick) {
      const wrapClass   = pickResult?.result === 'win' ? 'pick-win' : pickResult?.result === 'loss' ? 'pick-loss' : 'pick-pending';
      const resultClass = pickResult?.result === 'win' ? 's-result-win' : pickResult?.result === 'loss' ? 's-result-loss' : 's-result-pending';
      const resultLabel = pickResult?.result === 'win' ? '✅ Win'
        : pickResult?.result === 'loss'
          ? (fpUsed && Number(state.freePassWeek) === week ? '🎟️ FP saved you' : fpReq ? '⏳ FP requested' : '❌ Loss')
          : '⏳ Pending';

      pickHTML = `
        <div class="s-pick-row">
          <span class="s-pick-label">${canPick ? "This week's survivor pick:" : "Your pick:"}${canPick ? ' <span style="font-size:12px;color:var(--ink-faint);font-weight:400">(tap team below to change)</span>' : ''}</span>
        </div>
        <div class="s-current-pick ${wrapClass}">
          <img src="${espnLogoUrl(weekPick)}" onerror="this.style.display='none'" />
          ${normalizeAbbrev(weekPick)}
          <span class="${resultClass}">${resultLabel}</span>
        </div>`;

      if (blockedByLoss && !fpUsed && !fpReq) {
        pickHTML += `<button class="s-freepass-btn" id="requestFPBtn" style="margin-top:10px">🎟️ Request Free Pass</button>`;
      }
    } else {
      if (anyGameStarted && !canPick) {
        pickHTML = `<div class="s-pick-row"><span style="font-size:13px;color:var(--red)">⚠️ Games have started — no pick made this week.</span></div>`;
      } else {
        pickHTML = `<div class="s-pick-row"><span class="s-pick-label">Pick a team below to stay alive.</span></div>`;
      }
    }

    let gridHTML = '';
    if (canPick) {
      const usedSet = new Set(
        Object.entries(state.usedTeams || {})
          .filter(([w]) => w !== wk)
          .map(([, abbrev]) => normalizeAbbrev(abbrev))
      );
      gridHTML = `
        <div class="s-team-grid" id="sTeamGrid">
          ${NFL_TEAMS.map(abbrev => {
            const used    = usedSet.has(abbrev);
            const playing = games.some(g =>
              normalizeAbbrev(g.homeTeam.abbrev) === abbrev ||
              normalizeAbbrev(g.awayTeam.abbrev) === abbrev
            );
            const started = games.some(g =>
              (normalizeAbbrev(g.homeTeam.abbrev) === abbrev ||
               normalizeAbbrev(g.awayTeam.abbrev) === abbrev) &&
              new Date() >= new Date(g.startTime)
            );
            const isCurrentPick = normalizeAbbrev(weekPick||'') === abbrev;
            const disabled = used || started;
            return `<button class="s-team-tile${used ? ' s-used' : ''}${started && !used ? ' s-started' : ''}${isCurrentPick ? ' s-selected' : ''}"
              data-abbrev="${abbrev}" ${disabled ? 'disabled' : ''}
              title="${used ? 'Already used this season' : started ? 'Game started' : !playing ? 'Not playing this week' : abbrev}"
              style="${!playing && !disabled ? 'opacity:.4' : ''}">
              <img src="${espnLogoUrl(abbrev)}" onerror="this.style.display='none'" />
              <span>${abbrev}</span>
              ${used || (started && !used) ? '<span class="s-used-dot"></span>' : ''}
            </button>`;
          }).join('')}
        </div>
        <div id="sPickConfirmRow" style="display:none" class="s-confirm-row">
          <span id="sSelectedLabel" class="s-selected-label"></span>
          <button class="s-confirm-btn" id="sConfirmBtn">Confirm Pick</button>
          <button class="s-cancel-btn" onclick="document.getElementById('sPickConfirmRow').style.display='none';survivorSelected=null;document.querySelectorAll('.s-team-tile.s-selected').forEach(b=>{if(b.dataset.abbrev!=='${normalizeAbbrev(weekPick||'')}')b.classList.remove('s-selected')})">Cancel</button>
        </div>
        <div class="s-msg" id="sMsg"></div>`;
    }

    const fpNote = fpUsed
      ? `<span class="s-fp-note">🎟️ Free pass used week ${state.freePassWeek}</span>`
      : fpReq
        ? `<span class="s-fp-note" style="color:#7A5A10">⏳ Free pass pending</span>`
        : state.alive
          ? `<span class="s-fp-note" style="color:var(--green)">🎟️ Free pass available</span>`
          : '';

    card.innerHTML = `
      <div class="s-status-header">
        <div class="s-top-left">
          <span class="s-icon">${icon}</span>
          <div>
            <div class="s-title">${title}</div>
            <div class="s-sub">${sub}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${fpNote}
        </div>
      </div>
      ${pickHTML}
      ${gridHTML}
    `;

    document.getElementById('requestFPBtn')?.addEventListener('click', async () => {
      const btn = document.getElementById('requestFPBtn');
      btn.disabled = true; btn.textContent = 'Requesting…';
      const season = seasonKey();
      const fpWeek = state.eliminatedWeek || week;
      try {
        await update(ref(db), {
          [`survivor/${season}/${currentUser.uid}/freePassRequested`]: true,
          [`survivor/${season}/${currentUser.uid}/freePassWeek`]: fpWeek,
        });
        survivorState.freePassRequested = true;
        survivorState.freePassWeek = fpWeek;
        renderSurvivorCard(games, week);
      } catch(e) {
        btn.disabled = false; btn.textContent = '🎟️ Request Free Pass';
      }
    });

    if (canPick) {
      document.querySelectorAll('.s-team-tile:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.s-team-tile').forEach(b => b.classList.remove('s-selected'));
          btn.classList.add('s-selected');
          survivorSelected = btn.dataset.abbrev;
          const confirmRow = document.getElementById('sPickConfirmRow');
          const label = document.getElementById('sSelectedLabel');
          if (confirmRow) confirmRow.style.display = 'flex';
          if (label) label.textContent = `Pick: ${survivorSelected}`;
        });
      });
      document.getElementById('sConfirmBtn')?.addEventListener('click', () => confirmSurvivorPick(week));
    }
  }

  async function confirmSurvivorPick(week) {
    if (!survivorSelected) return;
    const season = seasonKey();
    const wk     = `week-${week}`;
    const btn    = document.getElementById('sConfirmBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const updatedTeams = { ...(survivorState.usedTeams || {}), [wk]: survivorSelected };
      await update(ref(db), {
        [`survivor/${season}/${currentUser.uid}/usedTeams`]:    updatedTeams,
        [`survivor/${season}/${currentUser.uid}/alive`]:        survivorState.alive,
        [`survivor/${season}/${currentUser.uid}/freePassUsed`]: survivorState.freePassUsed,
      });
      survivorState.usedTeams = updatedTeams;
      survivorSelected = null;
      renderSurvivorCard(Object.values(gamesCache), week);
    } catch (err) {
      const msg = document.getElementById('sMsg');
      if (msg) { msg.textContent = 'Failed to save. Try again.'; msg.className = 's-msg error show'; }
      btn.disabled = false; btn.textContent = 'Confirm Pick';
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }

    currentUser = user;

    const snap = await get(child(ref(db), `adminConfig/members/${user.uid}`));
    const member = snap.exists() ? snap.val() : null;
    const adminSnap = await get(child(ref(db), `adminConfig/admins/${user.uid}`));
    const isAdmin = adminSnap.exists() && adminSnap.val() === true;

    if (!member?.approved && !isAdmin) {
      window.location.href = 'index.html'; return;
    }

    initNav({
      activePage: 'picks.html',
      isAdmin,
      userName: member?.displayName || user.email,
    });
    checkPendingFPRequests();
    const _signOut = () => signOut(auth).then(() => window.location.href = 'index.html');
    document.getElementById('signOutBtn')?.addEventListener('click', _signOut);
    document.getElementById('drawerSignOutBtn')?.addEventListener('click', _signOut);

    const settingsSnap = await get(ref(db, 'adminConfig/settings'));
    const settings = settingsSnap.exists() ? settingsSnap.val() : {};
    seasonStartDate = settings.seasonStartDate || null;

    setWeek(getCurrentWeek());
  });
</script>
